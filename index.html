<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>خدمة خامسة وسادسة - مدارس الأحد</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
        body { background:#f0f2f5; padding:10px; min-height:100vh; position:relative; background-image:url('https://i.ibb.co/4gP3wDDV/image.png'); background-repeat:repeat; background-size:200px 200px; background-attachment:fixed; opacity:0.98; }
        body::before { content:''; position:fixed; top:0; left:0; width:100%; height:100%; background-color:rgba(255,255,255,0.85); pointer-events:none; z-index:0; }
        .container { max-width:1200px; margin:0 auto; background:rgba(255,255,255,0.95); backdrop-filter:blur(2px); border-radius:20px; box-shadow:0 8px 16px rgba(0,0,0,0.1); padding:20px; position:relative; z-index:1; }
        .header { display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:2px solid #e5e7eb; padding-bottom:15px; }
        .logo-container { display:flex; align-items:center; gap:15px; flex-wrap:wrap; }
        .logo-img { height:70px; width:auto; border-radius:10px; }
        .logo-text { font-size:24px; font-weight:bold; background:linear-gradient(135deg,#1e3a8a,#3b82f6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .btn { background:#1e3a8a; color:white; border:none; padding:12px 20px; border-radius:30px; cursor:pointer; font-size:16px; margin:5px; min-width:120px; transition:0.2s; }
        .btn:hover { background:#2563eb; }
        .btn-success { background:#10b981; }
        .btn-warning { background:#f59e0b; }
        .btn-info { background:#3b82f6; }
        .btn-coupon { background:#8b5cf6; }
        .btn-add { background:#10b981; }
        .login-form { max-width:400px; margin:20px auto; padding:30px; background:rgba(255,255,255,0.95); border-radius:24px; text-align:center; }
        .login-form input { width:100%; padding:16px; margin:8px 0 20px; border:1px solid #d1d5db; border-radius:16px; font-size:18px; }
        .date-bar, .date-range { display:flex; flex-wrap:wrap; gap:15px; background:#f9fafb; padding:20px; border-radius:20px; margin-bottom:25px; }
        .dashboard-summary { display:flex; gap:15px; flex-wrap:wrap; margin-bottom:25px; }
        .stat-card { background:white; border-radius:16px; padding:16px; flex:1 1 160px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
        .stat-card .value { font-size:28px; font-weight:700; color:#1e3a8a; }
        .table-wrapper { overflow-x:auto; margin-bottom:20px; border:1px solid #e5e7eb; border-radius:16px; background:white; }
        table { width:100%; border-collapse:collapse; min-width:900px; }
        th { background:#1e3a8a; color:white; padding:16px 12px; }
        td { border:1px solid #e5e7eb; padding:15px; text-align:center; }
        td:first-child { text-align:right; padding-right:20px; font-weight:500; }
        .grade-input, .behavior-select { width:80px; padding:12px; text-align:center; border:1px solid #d1d5db; border-radius:8px; }
        .total-grade { background:#e0f2fe; border-radius:8px; padding:8px; font-weight:700; }
        .absent-warning { background:#fee2e2; color:#b91c1c; border-radius:20px; padding:6px 10px; font-size:14px; display:inline-block; margin-left:5px; }
        .repeated-absence { background:#fef3c7; color:#92400e; border-radius:20px; padding:6px 10px; font-size:14px; display:inline-block; margin-left:5px; }
        .save-btn { background:#10b981; width:100%; padding:18px; border-radius:40px; font-size:20px; font-weight:600; margin-top:10px; }
        .message { padding:16px; border-radius:16px; margin:20px 0; text-align:center; }
        .success { background:#d1fae5; color:#065f46; }
        .error { background:#fee2e2; color:#991b1b; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background:white; padding:30px; border-radius:24px; max-width:500px; width:90%; }
        .coupon-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; }
        .coupon-content { background:white; padding:30px; border-radius:24px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; direction:rtl; }
        .filter-input, .filter-number { background:white !important; border:1px solid #d1d5db !important; padding:10px !important; border-radius:8px !important; }
        @media (max-width:768px){
            .btn { width:100%; margin:5px 0; }
            .grade-input, .behavior-select { max-width:100px; }
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<div id="addStudentModal" class="modal">
    <div class="modal-content">
        <h3>➕ إضافة طالب جديد</h3>
        <input type="text" id="newStudentName" placeholder="اسم الطالب">
        <div id="adminClassSelectDiv" style="display:none;">
            <select id="newStudentClass"></select>
        </div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn" id="confirmAddStudent">حفظ</button>
            <button class="btn btn-warning" id="cancelAddStudent">إلغاء</button>
        </div>
        <div id="addStudentMessage" style="color:red; margin-top:10px;"></div>
    </div>
</div>

<div id="couponModal" class="coupon-modal">
    <div class="coupon-content" id="couponContent">
        <span class="coupon-close" style="position:absolute; top:15px; left:15px; font-size:24px; cursor:pointer;" onclick="closeCouponModal()">&times;</span>
        <div id="couponInner"></div>
    </div>
</div>

<script>
    // ================== إعدادات Supabase ==================
    const SUPABASE_URL = 'https://segqpdkygxdzzpkkgiem.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlZ3FwZGt5Z3hkenpwa2tnaWVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NDQzOTMsImV4cCI6MjA4NzUyMDM5M30.wPx74fmu93ii-tm6iIeyPucRsNnSA8SFUsHhJitp1bs';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null, currentClassId = null, students = [], attendanceRecords = [], allClasses = [], currentAdminClassId = null;
    const LOGO_URL = 'https://i.ibb.co/4gP3wDDV/image.png';

    // ================== دالة إزالة التكرارات ==================
    function deduplicateStudents(list) {
        const map = new Map();
        for (const s of list) {
            const key = `${s.name}_${s.class_id}`;
            if (!map.has(key)) map.set(key, s);
        }
        return Array.from(map.values());
    }

    function normalizeText(t) { return t.toLowerCase().replace(/[أإآ]/g,'ا').replace(/[ى]/g,'ي').replace(/[ؤ]/g,'و').replace(/[ئ]/g,'ي').replace(/[ة]/g,'ه'); }
    function getToday() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function getThreeWeeksAgo() { const d=new Date(); d.setDate(d.getDate()-21); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

    async function fetchAllClasses() { const {data}=await supabase.from('classes').select('*'); return data||[]; }
    async function fetchAttendanceForDate(classId, date) { if(!classId||!students.length) return []; const ids=students.map(s=>s.id); const {data}=await supabase.from('attendance').select('*').in('student_id',ids).eq('date',date); return data||[]; }
    async function fetchAttendanceForDateRange(classId, s, e) { if(!classId) return []; const ids=students.map(s=>s.id); const {data}=await supabase.from('attendance').select('*').in('student_id',ids).gte('date',s).lte('date',e).order('date',{ascending:true}); return data||[]; }
    async function fetchAttendanceForAllClasses(s,e) { const {data}=await supabase.from('attendance').select('*').gte('date',s).lte('date',e).order('date'); return data||[]; }
    async function fetchAllStudents() { const {data}=await supabase.from('students').select('*').eq('active',true); return deduplicateStudents(data||[]); }

    async function isRepeatedAbsence(studentId, currentDate) {
        const {data}=await supabase.from('attendance').select('mass_grade,communion_grade,class_grade,behavior_grade').eq('student_id',studentId).lt('date',currentDate).order('date',{ascending:false}).limit(2);
        if(!data||data.length<2) return false;
        const isAbsent=(r)=> (r.mass_grade+r.communion_grade+r.class_grade+r.behavior_grade)===0;
        return isAbsent(data[0]) && isAbsent(data[1]);
    }

    async function saveAttendance(classId, date) {
        const {data:existing}=await supabase.from('attendance').select('id').eq('date',date).in('student_id',students.map(s=>s.id));
        if(existing?.length && !confirm(`⚠️ اليوم (${date}) مسجل بالفعل. هل تريد تعديله؟`)) return;
        if(!confirm('حفظ البيانات؟')) return;
        const records=[], inputs=document.querySelectorAll('[data-id]'), map=new Map();
        inputs.forEach(inp=>{ const id=inp.dataset.id, field=inp.dataset.field; if(!map.has(id)) map.set(id,{student_id:id,mass:0,communion:0,class:0,behavior:0,notes:''}); const rec=map.get(id); if(field==='mass') rec.mass=parseInt(inp.value)||0; if(field==='communion') rec.communion=parseInt(inp.value)||0; if(field==='class') rec.class=parseInt(inp.value)||0; if(field==='behavior') rec.behavior=parseInt(inp.value)||0; if(field==='notes') rec.notes=inp.value; });
        for(let rec of map.values()) records.push({student_id:rec.student_id,date,mass_grade:rec.mass,communion_grade:rec.communion,class_grade:rec.class,behavior_grade:rec.behavior,notes:rec.notes,recorded_by:currentUser.id});
        for(let rec of records) await supabase.from('attendance').upsert(rec,{onConflict:'student_id,date'});
        attendanceRecords = await fetchAttendanceForDate(classId, date);
        if(currentUser.role==='admin') renderDailyAdmin(classId,date); else renderDailyTable(date);
        document.getElementById('message').innerHTML='<div class="message success">تم الحفظ</div>';
    }

    // ================== دوال التسجيل اليومي ==================
    function renderDailyTable(selectedDate) {
        let rows='', studentsData=[];
        for(const s of students){
            const rec=attendanceRecords.find(r=>r.student_id===s.id);
            const mass=rec?.mass_grade||0, comm=rec?.communion_grade||0, cls=rec?.class_grade||0, beh=rec?.behavior_grade||0, notes=rec?.notes||'', total=mass+comm+cls+beh;
            studentsData.push({id:s.id,name:s.name,total});
            rows+=`<tr><td><span class="student-name" data-id="${s.id}">${s.name}</span></td><td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="mass" value="${mass}"></td><td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="communion" value="${comm}"></td><td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="class" value="${cls}"></td><td><select class="behavior-select" data-id="${s.id}" data-field="behavior">${[0,1,2,3,4,5].map(v=>`<option value="${v}" ${beh===v?'selected':''}>${v}</option>`).join('')}</select></td><td><input type="text" class="grade-input" data-id="${s.id}" data-field="notes" placeholder="..." value="${notes}"></td><td class="total-grade">${total}</td></tr>`;
        }
        document.getElementById('app').innerHTML = `
            <div><div class="header"><div class="logo-container"><img src="${LOGO_URL}" class="logo-img"><span class="logo-text">${currentUser?.classes?.class_name||'الفصل'}</span></div><div><button class="btn btn-add" id="addBtn">➕ إضافة طالب</button><button class="btn btn-warning" id="reportBtn">📊 التقارير</button><button class="btn" id="logoutBtn">تسجيل خروج</button></div></div>
            <div class="date-bar"><label>📅 التاريخ:</label><input type="date" id="attDate" value="${selectedDate}"></div>
            <div><input type="text" id="nameFilter" placeholder="🔍 بحث بالاسم" class="filter-input" style="width:100%; margin-bottom:20px;"></div>
            <div class="dashboard-summary" id="dashboard"></div>
            <div class="table-wrapper"><table><thead><tr><th>الاسم</th><th>القداس (0/10)</th><th>التناول (0/10)</th><th>حضور الخدمة (0/10)</th><th>السلوك (0-5)</th><th>ملاحظات</th><th>المجموع</th></tr></thead><tbody id="dailyBody">${rows}</tbody></table></div>
            <button class="save-btn" id="saveBtn">حفظ الحضور</button><div id="message"></div></div>`;
        updateDashboard();
        attachEvents();
        (async ()=>{
            for(const stu of studentsData){
                const repeated = await isRepeatedAbsence(stu.id, selectedDate);
                const span = document.querySelector(`.student-name[data-id="${stu.id}"]`);
                if(span){
                    if(repeated && stu.total===0) span.innerHTML = `${stu.name} <span class="repeated-absence">⚠️ غائب مرتين</span>`;
                    else if(stu.total===0) span.innerHTML = `${stu.name} <span class="absent-warning">⚠️ غائب</span>`;
                    else span.innerHTML = stu.name;
                }
            }
        })();
        document.getElementById('nameFilter').addEventListener('input',(e)=>{ const val=normalizeText(e.target.value); document.querySelectorAll('#dailyBody tr').forEach(row=>{ const name=normalizeText(row.cells[0].innerText); row.style.display=name.includes(val)?'':'none'; }); });
        document.getElementById('addBtn').addEventListener('click',()=>showAddStudent(false));
        document.getElementById('reportBtn').addEventListener('click',async()=>{ const end=getToday(), start=getThreeWeeksAgo(); attendanceRecords=await fetchAttendanceForDateRange(currentClassId,start,end); renderReportTable(start,end); });
        document.getElementById('saveBtn').addEventListener('click',()=>saveAttendance(currentClassId,selectedDate));
        document.getElementById('attDate').addEventListener('change',async(e)=>{ const nd=e.target.value; attendanceRecords=await fetchAttendanceForDate(currentClassId,nd); renderDailyTable(nd); });
        document.getElementById('logoutBtn').addEventListener('click',async()=>{ await supabase.auth.signOut(); init(); });
    }
    async function renderDailyAdmin(classId, selectedDate) {
        let rows='', studentsData=[];
        for(const s of students){
            const rec=attendanceRecords.find(r=>r.student_id===s.id);
            const mass=rec?.mass_grade||0, comm=rec?.communion_grade||0, cls=rec?.class_grade||0, beh=rec?.behavior_grade||0, notes=rec?.notes||'', total=mass+comm+cls+beh;
            studentsData.push({id:s.id,name:s.name,total});
            rows+=`<tr><td><span class="student-name" data-id="${s.id}">${s.name}</span></td><td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="mass" value="${mass}"></td><td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="communion" value="${comm}"></td><td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="class" value="${cls}"></td><td><select class="behavior-select" data-id="${s.id}" data-field="behavior">${[0,1,2,3,4,5].map(v=>`<option value="${v}" ${beh===v?'selected':''}>${v}</option>`).join('')}</select></td><td><input type="text" class="grade-input" data-id="${s.id}" data-field="notes" placeholder="..." value="${notes}"></td><td class="total-grade">${total}</td></tr>`;
        }
        document.getElementById('adminContent').innerHTML = `
            <div><div class="header" style="border-bottom:none;"><div class="logo-container"><img src="${LOGO_URL}" class="logo-img"><span class="logo-text">تسجيل يومي</span></div><div><button class="btn btn-add" id="addAdminBtn">➕ إضافة طالب</button><button class="btn btn-warning" id="reportAdminBtn">📊 التقارير</button></div></div>
            <div class="date-bar"><label>📅 التاريخ:</label><input type="date" id="attDateAdmin" value="${selectedDate}"></div>
            <div><input type="text" id="nameFilterAdmin" placeholder="🔍 بحث بالاسم" class="filter-input" style="width:100%; margin-bottom:20px;"></div>
            <div class="dashboard-summary" id="dashboardAdmin"></div>
            <div class="table-wrapper"><table><thead><tr><th>الاسم</th><th>القداس (0/10)</th><th>التناول (0/10)</th><th>حضور الخدمة (0/10)</th><th>السلوك (0-5)</th><th>ملاحظات</th><th>المجموع</th></tr></thead><tbody id="dailyBodyAdmin">${rows}</tbody></table></div>
            <button class="save-btn" id="saveAdminBtn">حفظ الحضور</button><div id="message"></div></div>`;
        updateDashboard();
        attachEvents();
        (async ()=>{
            for(const stu of studentsData){
                const repeated = await isRepeatedAbsence(stu.id, selectedDate);
                const span = document.querySelector(`.student-name[data-id="${stu.id}"]`);
                if(span){
                    if(repeated && stu.total===0) span.innerHTML = `${stu.name} <span class="repeated-absence">⚠️ غائب مرتين</span>`;
                    else if(stu.total===0) span.innerHTML = `${stu.name} <span class="absent-warning">⚠️ غائب</span>`;
                    else span.innerHTML = stu.name;
                }
            }
        })();
        document.getElementById('nameFilterAdmin').addEventListener('input',(e)=>{ const val=normalizeText(e.target.value); document.querySelectorAll('#dailyBodyAdmin tr').forEach(row=>{ const name=normalizeText(row.cells[0].innerText); row.style.display=name.includes(val)?'':'none'; }); });
        document.getElementById('addAdminBtn').addEventListener('click',()=>showAddStudent(true));
        document.getElementById('reportAdminBtn').addEventListener('click',async()=>{ const end=getToday(), start=getThreeWeeksAgo(); attendanceRecords=await fetchAttendanceForDateRange(classId,start,end); renderReportTableAdmin(classId,start,end); });
        document.getElementById('saveAdminBtn').addEventListener('click',()=>saveAttendance(classId,selectedDate));
        document.getElementById('attDateAdmin').addEventListener('change',async(e)=>{ const nd=e.target.value; attendanceRecords=await fetchAttendanceForDate(classId,nd); renderDailyAdmin(classId,nd); });
    }
    function updateDashboard() {
        const total=students.length, present=attendanceRecords.filter(r=>r.mass_grade===10 && r.communion_grade===10 && r.class_grade===10).length;
        const massCount=attendanceRecords.filter(r=>r.mass_grade===10).length, commCount=attendanceRecords.filter(r=>r.communion_grade===10).length, classCount=attendanceRecords.filter(r=>r.class_grade===10).length;
        const dash = document.querySelector('.dashboard-summary');
        if(dash) dash.innerHTML = `<div class="stat-card"><h4>عدد المخدومين</h4><div class="value">${total}</div></div><div class="stat-card"><h4>الحضور الكامل</h4><div class="value">${present}</div></div><div class="stat-card"><h4>القداس (10)</h4><div class="value">${massCount}</div></div><div class="stat-card"><h4>التناول (10)</h4><div class="value">${commCount}</div></div><div class="stat-card"><h4>الخدمة (10)</h4><div class="value">${classCount}</div></div>`;
    }
    function attachEvents(){ document.querySelectorAll('.grade-input, .behavior-select').forEach(inp=>{ inp.addEventListener('input',function(){ const row=this.closest('tr'); let m=parseInt(row.querySelector('[data-field="mass"]')?.value)||0, c=parseInt(row.querySelector('[data-field="communion"]')?.value)||0, cl=parseInt(row.querySelector('[data-field="class"]')?.value)||0, b=parseInt(row.querySelector('[data-field="behavior"]')?.value)||0; row.querySelector('.total-grade').innerText=m+c+cl+b; }); }); }

    // ================== إضافة طالب ==================
    async function checkDuplicate(name,classId){ const {data}=await supabase.from('students').select('id').eq('name',name).eq('class_id',classId).maybeSingle(); return !!data; }
    async function addStudentFn(name,classId){ if(await checkDuplicate(name,classId)){ alert('الاسم موجود بالفعل في هذا الفصل'); return false; } await supabase.from('students').insert([{name,class_id:classId,active:true}]); return true; }
    function showAddStudent(forAdmin=false){ const modal=document.getElementById('addStudentModal'); const div=document.getElementById('adminClassSelectDiv'); if(forAdmin && allClasses.length){ div.style.display='block'; const sel=document.getElementById('newStudentClass'); sel.innerHTML='<option value="">اختر الفصل</option>'; allClasses.forEach(cls=>{ sel.innerHTML+=`<option value="${cls.id}">${cls.class_name}</option>`; }); } else div.style.display='none'; modal.style.display='flex'; }
    function hideModal(){ document.getElementById('addStudentModal').style.display='none'; document.getElementById('newStudentName').value=''; }
    async function handleAdd(){
        const name=document.getElementById('newStudentName').value.trim(); if(!name){ document.getElementById('addStudentMessage').innerHTML='الرجاء إدخال اسم'; return; }
        let classId; if(currentUser.role==='admin'){ classId=document.getElementById('newStudentClass').value; if(!classId){ document.getElementById('addStudentMessage').innerHTML='اختر الفصل'; return; } } else classId=currentClassId;
        if(await addStudentFn(name,classId)){ hideModal(); if(currentUser.role==='admin' && currentAdminClassId){ const {data:stds}=await supabase.from('students').select('*').eq('class_id',currentAdminClassId).eq('active',true); students=deduplicateStudents(stds||[]); const today=getToday(); attendanceRecords=await fetchAttendanceForDate(currentAdminClassId,today); renderDailyAdmin(currentAdminClassId,today); } else if(currentUser.role!=='admin'){ const {data:stds}=await supabase.from('students').select('*').eq('class_id',currentClassId).eq('active',true); students=deduplicateStudents(stds||[]); const today=getToday(); attendanceRecords=await fetchAttendanceForDate(currentClassId,today); renderDailyTable(today); } else loadAdminView(); }
    }
    document.getElementById('confirmAddStudent').addEventListener('click',handleAdd);
    document.getElementById('cancelAddStudent').addEventListener('click',hideModal);

    // ================== دوال التقارير (موجزة) ==================
    function renderReportTable(startDate,endDate){
        const summary=students.map(s=>{ const recs=attendanceRecords.filter(r=>r.student_id===s.id).filter(r=>(r.mass_grade||0)+(r.communion_grade||0)+(r.class_grade||0)>0); const days=recs.length; const tM=recs.reduce((a,b)=>a+(b.mass_grade||0),0), tC=recs.reduce((a,b)=>a+(b.communion_grade||0),0), tCl=recs.reduce((a,b)=>a+(b.class_grade||0),0), tB=recs.reduce((a,b)=>a+(b.behavior_grade||0),0); return {id:s.id,name:s.name,days,tM,tC,tCl,tB,total:tM+tC+tCl+tB}; });
        let filtered=summary, nameF='', massF=0, commF=0, classF=0;

            if(userData){
                currentUser=userData; currentClassId=userData.class_id;
                if(userData.role==='admin'){ allClasses=await fetchAllClasses(); loadAdminView(); }
                else{ const {data:stds}=await supabase.from('students').select('*').eq('class_id',currentClassId).eq('active',true); students=deduplicateStudents(stds||[]); renderDailyTable(getToday()); }
            } else renderLogin();
        } else renderLogin();
    }
    function renderLogin(){
        document.getElementById('app').innerHTML = `<div><div class="header" style="justify-content:center; border-bottom:none;"><div class="logo-container"><img src="${LOGO_URL}" class="logo-img"><span class="logo-text">خدمة خامسة وسادسة</span></div></div><div class="login-form"><h2>تسجيل الدخول</h2><input type="email" id="email" placeholder="البريد الإلكتروني"><input type="password" id="password" placeholder="كلمة السر"><button class="btn" id="loginBtn">دخول</button><div id="loginMsg"></div></div></div>`;
        document.getElementById('loginBtn').addEventListener('click',async()=>{ const email=document.getElementById('email').value, password=document.getElementById('password').value; const {error}=await supabase.auth.signInWithPassword({email,password}); if(error) document.getElementById('loginMsg').innerHTML=`<div class="error">${error.message}</div>`; else init(); });
    }
    async function loadAdminView(){
        let options='<option value="">اختر الفصل</option>'; allClasses.forEach(cls=>{ options+=`<option value="${cls.id}">${cls.class_name}</option>`; });
        document.getElementById('app').innerHTML = `<div><div class="header"><div class="logo-container"><img src="${LOGO_URL}" class="logo-img"><span class="logo-text">خدمة خامسة وسادسة</span></div><div><button class="btn btn-info" id="allReportsBtn">📋 تقرير شامل</button><button class="btn" id="logoutBtn">تسجيل خروج</button></div></div><div><label>اختر الفصل: </label><select id="classSelect">${options}</select></div><div id="adminContent"></div></div>`;
        document.getElementById('logoutBtn').addEventListener('click',async()=>{ await supabase.auth.signOut(); init(); });
        document.getElementById('allReportsBtn').addEventListener('click',async()=>{ const end=getToday(), start=getThreeWeeksAgo(); const att=await fetchAttendanceForAllClasses(start,end); const allSt=await fetchAllStudents(); renderAllClassesReport(allSt,att,start,end); });
        document.getElementById('classSelect').addEventListener('change',async(e)=>{ const classId=e.target.value; if(classId){ currentAdminClassId=classId; const {data:stds}=await supabase.from('students').select('*').eq('class_id',classId).eq('active',true); students=deduplicateStudents(stds||[]); await renderDailyAdmin(classId,getToday()); } });
    }
    init();
</script>
</body>
</html>
