<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحضور - مدارس الأحد</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ... (الأنماط السابقة) ... */
        .date-picker {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .date-picker label {
            font-weight: bold;
        }
        .date-picker input {
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }
        .total-grade {
            font-weight: bold;
            color: #1e3a8a;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- يتم ملء المحتوى عبر JavaScript -->
    </div>

    <script>
        // ------------------- إعدادات Supabase -------------------
        const SUPABASE_URL = 'https://segqpdkygxdzzpkkgiem.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlZ3FwZGt5Z3hkenpwa2tnaWVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NDQzOTMsImV4cCI6MjA4NzUyMDM5M30.wPx74fmu93ii-tm6iIeyPucRsNnSA8SFUsHhJitp1bs';
        // --------------------------------------------------------

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let currentClassId = null;
        let students = [];

        const app = document.getElementById('app');

        // دالة لجلب آخر جمعة (أو التاريخ الحالي)
        function getDefaultDate() {
            const today = new Date();
            const day = today.getDay(); // 0 = الأحد, 5 = الجمعة
            if (day === 5) {
                return today.toISOString().split('T')[0];
            } else {
                // العودة إلى آخر جمعة
                const diff = day >= 5 ? day - 5 : day + 2; // حساب الفرق
                const lastFriday = new Date(today);
                lastFriday.setDate(today.getDate() - diff);
                return lastFriday.toISOString().split('T')[0];
            }
        }

        async function init() {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            if (session?.user) {
                const { data: userData, error: userError } = await supabaseClient
                    .from('users')
                    .select('*, classes(id, class_name)')
                    .eq('id', session.user.id)
                    .single();

                if (userData) {
                    currentUser = userData;
                    currentClassId = userData.class_id;
                    if (userData.role === 'admin') {
                        loadAdminView();
                    } else {
                        loadServantView();
                    }
                } else {
                    renderLogin();
                }
            } else {
                renderLogin();
            }
        }

        function renderLogin() {
            app.innerHTML = `
                <div class="login-form">
                    <h2 style="text-align:center; margin-bottom:20px;">تسجيل الدخول</h2>
                    <input type="email" id="email" placeholder="البريد الإلكتروني" />
                    <input type="password" id="password" placeholder="كلمة السر" />
                    <button class="btn" id="loginBtn" style="width:100%;">دخول</button>
                    <div id="loginMessage"></div>
                </div>
            `;
            document.getElementById('loginBtn').addEventListener('click', async () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    document.getElementById('loginMessage').innerHTML = `<div class="message error">${error.message}</div>`;
                } else {
                    init();
                }
            });
        }

        async function loadServantView() {
            const { data: stds, error } = await supabaseClient
                .from('students')
                .select('*')
                .eq('class_id', currentClassId)
                .eq('active', true);
            students = stds || [];
            renderAttendanceTable();
        }

        async function loadAdminView() {
            const { data: classes, error } = await supabaseClient.from('classes').select('*');
            let options = '<option value="">اختر الفصل</option>';
            classes.forEach(cls => {
                options += `<option value="${cls.id}">${cls.class_name}</option>`;
            });
            app.innerHTML = `
                <div>
                    <div class="header">
                        <div class="logo">نظام الحضور - الأدمن</div>
                        <button class="btn" id="logoutBtn">تسجيل خروج</button>
                    </div>
                    <div style="margin-bottom:20px;">
                        <label>اختر الفصل: </label>
                        <select id="classSelect">${options}</select>
                    </div>
                    <div id="adminTable"></div>
                </div>
            `;
            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('classSelect').addEventListener('change', async (e) => {
                const classId = e.target.value;
                if (classId) {
                    const { data: stds } = await supabaseClient.from('students').select('*').eq('class_id', classId).eq('active', true);
                    students = stds || [];
                    renderAttendanceTableForAdmin(classId);
                } else {
                    document.getElementById('adminTable').innerHTML = '';
                }
            });
        }

        // دالة لحساب المجموع من المدخلات
        function calculateTotal(row) {
            const mass = parseInt(row.querySelector('[data-field="mass"]').value) || 0;
            const communion = parseInt(row.querySelector('[data-field="communion"]').value) || 0;
            const classGrade = parseInt(row.querySelector('[data-field="class"]').value) || 0;
            const behavior = parseInt(row.querySelector('[data-field="behavior"]').value) || 0;
            return mass + communion + classGrade + behavior;
        }

        // دالة لتحديث المجموع في الصف
        function updateTotal(row) {
            const totalCell = row.querySelector('.total-grade');
            if (totalCell) {
                totalCell.textContent = calculateTotal(row);
            }
        }

        function renderAttendanceTable() {
            const defaultDate = getDefaultDate();
            let rows = '';
            students.forEach(s => {
                rows += `
                    <tr data-student-id="${s.id}">
                        <td>${s.name}</td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="mass" value="0" oninput="updateTotal(this.closest('tr'))"></td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="communion" value="0" oninput="updateTotal(this.closest('tr'))"></td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="class" value="0" oninput="updateTotal(this.closest('tr'))"></td>
                        <td>
                            <select class="behavior-select" data-id="${s.id}" data-field="behavior" onchange="updateTotal(this.closest('tr'))">
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                            </select>
                        </td>
                        <td><input type="text" class="grade-input" data-id="${s.id}" data-field="notes" placeholder="ملاحظات"></td>
                        <td><span class="total-grade">0</span></td> <!-- عمود المجموع -->
                    </tr>
                `;
            });
            app.innerHTML = `
                <div>
                    <div class="header">
                        <div class="logo">${currentUser?.classes?.class_name || 'الفصل'}</div>
                        <button class="btn" id="logoutBtn">تسجيل خروج</button>
                    </div>
                    <div class="date-picker">
                        <label for="attendanceDate">التاريخ:</label>
                        <input type="date" id="attendanceDate" value="${defaultDate}">
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>الاسم</th>
                                    <th>القداس (0/10)</th>
                                    <th>التناول (0/10)</th>
                                    <th>حضور الخدمة (0/10)</th>
                                    <th>السلوك (0-5)</th>
                                    <th>ملاحظات</th>
                                    <th>المجموع</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rows}
                            </tbody>
                        </table>
                    </div>
                    <button class="save-btn" id="saveAttendance">حفظ الحضور</button>
                    <div id="message"></div>
                </div>
            `;
            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('saveAttendance').addEventListener('click', saveAttendance);
        }

        function renderAttendanceTableForAdmin(classId) {
            const defaultDate = getDefaultDate();
            let rows = '';
            students.forEach(s => {
                rows += `
                    <tr data-student-id="${s.id}">
                        <td>${s.name}</td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="mass" value="0" oninput="updateTotal(this.closest('tr'))"></td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="communion" value="0" oninput="updateTotal(this.closest('tr'))"></td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="class" value="0" oninput="updateTotal(this.closest('tr'))"></td>
                        <td>
                            <select class="behavior-select" data-id="${s.id}" data-field="behavior" onchange="updateTotal(this.closest('tr'))">
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                            </select>
                        </td>
                        <td><input type="text" class="grade-input" data-id="${s.id}" data-field="notes" placeholder="ملاحظات"></td>
                        <td><span class="total-grade">0</span></td>
                    </tr>
                `;
            });
            document.getElementById('adminTable').innerHTML = `
                <div class="date-picker">
                    <label for="attendanceDate">التاريخ:</label>
                    <input type="date" id="attendanceDate" value="${defaultDate}">
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>الاسم</th>
                                <th>القداس (0/10)</th>
                                <th>التناول (0/10)</th>
                                <th>حضور الخدمة (0/10)</th>
                                <th>السلوك (0-5)</th>
                                <th>ملاحظات</th>
                                <th>المجموع</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows}
                        </tbody>
                    </table>
                </div>
                <button class="save-btn" id="saveAttendanceAdmin">حفظ الحضور</button>
                <div id="message"></div>
            `;
            document.getElementById('saveAttendanceAdmin').addEventListener('click', () => saveAttendance(classId));
        }

        async function saveAttendance(classIdForAdmin = null) {
            const classId = classIdForAdmin || currentClassId;
            const dateInput = document.getElementById('attendanceDate');
            const date = dateInput ? dateInput.value : new Date().toISOString().split('T')[0];
            const records = [];
            const rows = document.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const studentId = row.dataset.studentId;
                if (!studentId) return;
                const mass = row.querySelector('[data-field="mass"]')?.value || 0;
                const communion = row.querySelector('[data-field="communion"]')?.value || 0;
                const classGrade = row.querySelector('[data-field="class"]')?.value || 0;
                const behavior = row.querySelector('[data-field="behavior"]')?.value || 0;
                const notes = row.querySelector('[data-field="notes"]')?.value || '';
                records.push({
                    student_id: studentId,
                    date: date,
                    mass_grade: parseInt(mass) || 0,
                    communion_grade: parseInt(communion) || 0,
                    class_grade: parseInt(classGrade) || 0,
                    behavior_grade: parseInt(behavior) || 0,
                    notes: notes,
                    recorded_by: currentUser.id
                });
            });

            let hasError = false;
            for (let rec of records) {
                const { error } = await supabaseClient.from('attendance').insert(rec);
                if (error) {
                    console.error(error);
                    hasError = true;
                }
            }
            const msgDiv = document.getElementById('message');
            if (hasError) {
                msgDiv.innerHTML = '<div class="message error">حدث خطأ أثناء الحفظ، بعض السجلات قد لا تكون محفوظة.</div>';
            } else {
                msgDiv.innerHTML = '<div class="message success">تم حفظ الحضور بنجاح</div>';
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            init();
        }

        // ربط دوال التحديث بالكائن العام window ليتم استدعاؤها من HTML
        window.updateTotal = updateTotal;
        window.calculateTotal = calculateTotal;

        console.log('الملف الجديد يعمل');
        init();
    </script>
</body>
</html>
