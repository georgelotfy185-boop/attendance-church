<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>خدمة خامسة وسادسة - مدارس الأحد</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; padding: 10px; min-height: 100vh; background-image: url('https://i.ibb.co/4gP3wDDV/image.png'); background-repeat: repeat; background-size: 200px 200px; background-attachment: fixed; opacity: 0.98; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 255, 255, 0.85); pointer-events: none; z-index: 0; }
        .container { max-width: 1200px; margin: 0 auto; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(2px); border-radius: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); padding: 20px; position: relative; z-index: 1; }
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #e5e7eb; padding-bottom: 15px; }
        .logo-container { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .logo-img { height: 70px; width: auto; border-radius: 10px; }
        .logo-text { font-size: 24px; font-weight: bold; background: linear-gradient(135deg,#1e3a8a,#3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn { background: #1e3a8a; color: white; border: none; padding: 12px 20px; border-radius: 30px; cursor: pointer; font-size: 16px; font-weight: 500; margin: 5px; min-width: 120px; transition: 0.2s; }
        .btn:hover { background: #2563eb; }
        .btn-success { background: #10b981; }
        .btn-warning { background: #f59e0b; }
        .btn-info { background: #3b82f6; }
        .btn-coupon { background: #8b5cf6; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; margin-left: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .login-form { max-width: 400px; margin: 20px auto; padding: 30px; background: rgba(255,255,255,0.95); border-radius: 24px; text-align: center; }
        .login-form input { width: 100%; padding: 16px; margin: 8px 0 20px; border: 1px solid #d1d5db; border-radius: 16px; font-size: 18px; }
        .date-bar, .date-range { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; margin-bottom: 25px; background: #f9fafb; padding: 20px; border-radius: 20px; }
        .date-bar label, .date-range label { font-weight: 600; color: #374151; }
        .date-bar input[type="date"], .date-range input[type="date"] { padding: 12px; border: 1px solid #d1d5db; border-radius: 12px; background: white; flex: 1; }
        .dashboard-summary { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 25px; }
        .stat-card { background: white; border-radius: 16px; padding: 16px; flex: 1 1 160px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-card .value { font-size: 28px; font-weight: 700; color: #1e3a8a; }
        .table-wrapper { overflow-x: auto; margin-bottom: 20px; border-radius: 16px; border: 1px solid #e5e7eb; background: white; }
        .attendance-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .attendance-table th, .attendance-table td { border: 1px solid #e5e7eb; padding: 12px; text-align: center; vertical-align: middle; }
        .attendance-table th { background: #1e3a8a; color: white; font-weight: 600; }
        .attendance-table input, .attendance-table select { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; text-align: center; box-sizing: border-box; }
        .attendance-table input:focus, .attendance-table select:focus { outline: none; border-color: #1e3a8a; }
        .attendance-table td:first-child { text-align: right; }
        .name-cell { display: flex; align-items: center; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
        .absent-badge { background: #fee2e2; color: #b91c1c; border-radius: 20px; padding: 4px 8px; font-size: 13px; display: inline-block; white-space: nowrap; }
        .repeated-badge { background: #fef3c7; color: #92400e; border-radius: 20px; padding: 4px 8px; font-size: 13px; display: inline-block; white-space: nowrap; }
        .save-btn { background: #10b981; color: white; border: none; width: 100%; padding: 18px; border-radius: 40px; font-size: 20px; font-weight: 600; margin-top: 20px; cursor: pointer; }
        .message { padding: 16px; border-radius: 16px; margin: 20px 0; text-align: center; }
        .success { background: #d1fae5; color: #065f46; }
        .error { background: #fee2e2; color: #991b1b; }
        .modal, .coupon-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content, .coupon-content { background: white; padding: 30px; border-radius: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; direction: rtl; }
        .coupon-close { position: absolute; top: 15px; left: 15px; font-size: 24px; cursor: pointer; }
        .print-btn { background: #1e3a8a; color: white; width: 100%; padding: 12px; border-radius: 30px; margin-top: 15px; cursor: pointer; border: none; }
        .filter-input, .filter-number { padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; width: 150px; }
        @media (max-width: 768px) {
            .btn { width: 100%; margin: 5px 0; }
            .attendance-table th, .attendance-table td { padding: 8px; }
            .filter-input, .filter-number { width: 100%; margin-top: 5px; }
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<!-- نافذة إضافة طالب -->
<div id="addStudentModal" class="modal">
    <div class="modal-content">
        <h3>➕ إضافة طالب جديد</h3>
        <input type="text" id="newStudentName" placeholder="اسم الطالب">
        <div id="adminClassSelectDiv" style="display: none;">
            <select id="newStudentClass"></select>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button class="btn" id="confirmAddStudent">حفظ</button>
            <button class="btn btn-warning" id="cancelAddStudent">إلغاء</button>
        </div>
        <div id="addStudentMessage" style="color: red;"></div>
    </div>
</div>

<!-- نافذة الكوبون -->
<div id="couponModal" class="coupon-modal">
    <div class="coupon-content" id="couponContent">
        <span class="coupon-close" onclick="closeCouponModal()">&times;</span>
        <div id="couponInner"></div>
    </div>
</div>

<script>
    // ------------------- إعدادات Supabase -------------------
    const SUPABASE_URL = 'https://segqpdkygxdzzpkkgiem.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlZ3FwZGt5Z3hkenpwa2tnaWVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NDQzOTMsImV4cCI6MjA4NzUyMDM5M30.wPx74fmu93ii-tm6iIeyPucRsNnSA8SFUsHhJitp1bs';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null, currentClassId = null, students = [], attendanceRecords = [], allClasses = [], currentAdminClassId = null;
    const LOGO_URL = 'https://i.ibb.co/4gP3wDDV/image.png';

    // ================== دوال مساعدة ==================
    function normalizeText(t) { if (!t) return ''; return t.toLowerCase().replace(/[أإآ]/g, 'ا').replace(/[ى]/g, 'ي').replace(/[ؤ]/g, 'و').replace(/[ئ]/g, 'ي').replace(/[ة]/g, 'ه'); }
    function getTodayDate() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }
    function getThreeWeeksAgo() { const d = new Date(); d.setDate(d.getDate() - 21); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }

    // إزالة التكرارات
    function deduplicateStudents(list) {
        const map = new Map();
        for (const s of list) { const key = `${s.name}_${s.class_id}`; if (!map.has(key)) map.set(key, s); }
        return Array.from(map.values());
    }

    // جلب البيانات
    async function fetchAllClasses() { const { data } = await supabase.from('classes').select('*'); return data || []; }
    async function fetchAllStudents() { const { data } = await supabase.from('students').select('*').eq('active', true); return deduplicateStudents(data || []); }
    async function fetchAttendanceForAllClasses(start, end) { const { data } = await supabase.from('attendance').select('*').gte('date', start).lte('date', end).order('date', { ascending: true }); return data || []; }
    async function fetchAttendanceForDateRange(classId, start, end) {
        if (!classId) return [];
        const ids = students.map(s => s.id);
        const { data } = await supabase.from('attendance').select('*').in('student_id', ids).gte('date', start).lte('date', end).order('date', { ascending: true });
        return data || [];
    }
    async function fetchAttendanceForDate(classId, date) {
        if (!classId || !students.length) return [];
        const ids = students.map(s => s.id);
        const { data } = await supabase.from('attendance').select('*').in('student_id', ids).eq('date', date);
        return data || [];
    }

    // الغياب المتكرر
    async function isRepeatedAbsence(studentId, currentDate) {
        const { data } = await supabase.from('attendance').select('mass_grade,communion_grade,class_grade,behavior_grade').eq('student_id', studentId).lt('date', currentDate).order('date', { ascending: false }).limit(2);
        if (!data || data.length < 2) return false;
        const isAbsent = (r) => (r.mass_grade + r.communion_grade + r.class_grade + r.behavior_grade) === 0;
        return isAbsent(data[0]) && isAbsent(data[1]);
    }

    // إضافة طالب
    async function checkDuplicateStudent(name, classId) { const { data } = await supabase.from('students').select('id').eq('name', name).eq('class_id', classId).maybeSingle(); return !!data; }
    async function addStudent(name, classId) {
        if (await checkDuplicateStudent(name, classId)) { alert('⚠️ هذا الاسم موجود بالفعل في نفس الفصل.'); return false; }
        const { error } = await supabase.from('students').insert([{ name, class_id: classId, active: true }]);
        if (error) { alert('خطأ في الإضافة: ' + error.message); return false; }
        return true;
    }
    function showAddStudentModal(forAdmin = false) {
        const div = document.getElementById('adminClassSelectDiv');
        if (forAdmin && allClasses.length) {
            div.style.display = 'block';
            const sel = document.getElementById('newStudentClass');
            sel.innerHTML = '<option value="">اختر الفصل</option>';
            allClasses.forEach(cls => { sel.innerHTML += `<option value="${cls.id}">${cls.class_name}</option>`; });
        } else div.style.display = 'none';
        document.getElementById('addStudentModal').style.display = 'flex';
    }
    function hideAddStudentModal() { document.getElementById('addStudentModal').style.display = 'none'; document.getElementById('newStudentName').value = ''; document.getElementById('addStudentMessage').innerHTML = ''; }
    async function handleAddStudent() {
        const name = document.getElementById('newStudentName').value.trim();
        if (!name) { document.getElementById('addStudentMessage').innerHTML = '⚠️ الرجاء إدخال اسم الطالب'; return; }
        let classId;
        if (currentUser.role === 'admin') {
            classId = document.getElementById('newStudentClass').value;
            if (!classId) { document.getElementById('addStudentMessage').innerHTML = '⚠️ الرجاء اختيار الفصل'; return; }
        } else classId = currentClassId;
        if (await addStudent(name, classId)) {
            hideAddStudentModal();
            if (currentUser.role === 'admin' && currentAdminClassId) {
                const { data: stds } = await supabase.from('students').select('*').eq('class_id', currentAdminClassId).eq('active', true);
                students = deduplicateStudents(stds || []);
                attendanceRecords = await fetchAttendanceForDate(currentAdminClassId, getTodayDate());
                renderDailyTableAdmin(currentAdminClassId, getTodayDate());
            } else if (currentUser.role !== 'admin') {
                const { data: stds } = await supabase.from('students').select('*').eq('class_id', currentClassId).eq('active', true);
                students = deduplicateStudents(stds || []);
                attendanceRecords = await fetchAttendanceForDate(currentClassId, getTodayDate());
                renderDailyTable(getTodayDate());
            } else loadAdminView();
        }
    }

    // حفظ الحضور
    async function saveAttendance(classId, date) {
        const { data: existing } = await supabase.from('attendance').select('id').eq('date', date).in('student_id', students.map(s => s.id));
        if (existing?.length && !confirm(`⚠️ هذا اليوم (${date}) مسجل بالفعل.\nهل تريد تعديل البيانات؟`)) return;
        if (!confirm('هل أنت متأكد من حفظ البيانات؟')) return;
        const records = [];
        document.querySelectorAll('#attendanceTableBody tr').forEach(row => {
            const studentId = row.dataset.id;
            const mass = parseInt(row.querySelector('.mass-input')?.value) || 0;
            const communion = parseInt(row.querySelector('.communion-input')?.value) || 0;
            const classG = parseInt(row.querySelector('.class-input')?.value) || 0;
            const behavior = parseInt(row.querySelector('.behavior-select')?.value) || 0;
            const notes = row.querySelector('.notes-input')?.value || '';
            records.push({ student_id: studentId, date, mass_grade: mass, communion_grade: communion, class_grade: classG, behavior_grade: behavior, notes, recorded_by: currentUser.id });
        });
        for (let rec of records) await supabase.from('attendance').upsert(rec, { onConflict: 'student_id, date' });
        attendanceRecords = await fetchAttendanceForDate(classId, date);
        if (currentUser.role === 'admin') renderDailyTableAdmin(classId, date); else renderDailyTable(date);
        document.getElementById('message').innerHTML = '<div class="message success">تم حفظ الحضور بنجاح</div>';
    }

    // عرض الجدول اليومي (باستخدام <tr> ثابت)
    async function renderDailyView() {
        attendanceRecords = await fetchAttendanceForDate(currentClassId, getTodayDate());
        renderDailyTable(getTodayDate());
    }
    function renderDailyTable(selectedDate) {
        let rows = '';
        for (const s of students) {
            const rec = attendanceRecords.find(r => r.student_id === s.id);
            const mass = rec?.mass_grade || 0, communion = rec?.communion_grade || 0, classG = rec?.class_grade || 0, behavior = rec?.behavior_grade || 0, notes = rec?.notes || '';
            rows += `<tr data-id="${s.id}">
                        <td><div class="name-cell"><span>${s.name}</span><span class="absent-badge" style="display:none;">⚠️ غائب</span><span class="repeated-badge" style="display:none;">⚠️ غائب مرتين</span></div></td>
                        <td><input type="number" min="0" max="10" step="10" class="mass-input" value="${mass}"></td>
                        <td><input type="number" min="0" max="10" step="10" class="communion-input" value="${communion}"></td>
                        <td><input type="number" min="0" max="10" step="10" class="class-input" value="${classG}"></td>
                        <td><select class="behavior-select">${[0,1,2,3,4,5].map(v => `<option value="${v}" ${behavior === v ? 'selected' : ''}>${v}</option>`).join('')}</select></td>
                        <td><input type="text" class="notes-input" value="${notes.replace(/"/g, '&quot;')}"></td>
                    </tr>`;
        }
        document.getElementById('app').innerHTML = `
            <div><div class="header"><div class="logo-container"><img src="${LOGO_URL}" class="logo-img"><span class="logo-text">${currentUser?.classes?.class_name || 'الفصل'}</span></div><div><button class="btn btn-add" id="addStudentBtn">➕ إضافة طالب</button><button class="btn btn-warning" id="reportBtn">📊 التقارير</button><button class="btn" id="logoutBtn">تسجيل خروج</button></div></div>
            <div class="date-bar"><label>📅 التاريخ:</label><input type="date" id="attendanceDate" value="${selectedDate}"></div>
            <div><input type="text" id="dailyNameFilter" placeholder="🔍 بحث بالاسم" class="filter-input" style="width:100%; margin-bottom:20px;"></div>
            <div class="dashboard-summary" id="dashboardSummary"></div>
            <div class="table-wrapper">
                <table class="attendance-table">
                    <thead><tr><th>الاسم</th><th>القداس (0/10)</th><th>التناول (0/10)</th><th>حضور الخدمة (0/10)</th><th>السلوك (0-5)</th><th>ملاحظات</th></tr></thead>
                    <tbody id="attendanceTableBody">${rows}</tbody>
                </table>
            </div>
            <button class="save-btn" id="saveAttendance">حفظ الحضور</button>
            <div id="message"></div></div>`;

        updateDashboard();
        attachTableListeners();
        (async () => {
            for (const s of students) {
                const repeated = await isRepeatedAbsence(s.id, selectedDate);
                const rec = attendanceRecords.find(r => r.student_id === s.id);
                const total = (rec?.mass_grade || 0) + (rec?.communion_grade || 0) + (rec?.class_grade || 0) + (rec?.behavior_grade || 0);
                const row = document.querySelector(`tr[data-id="${s.id}"]`);
                if (row) {
                    const absentSpan = row.querySelector('.absent-badge');
                    const repeatedSpan = row.querySelector('.repeated-badge');
                    if (repeated && total === 0) {
                        absentSpan.style.display = 'none';
                        repeatedSpan.style.display = 'inline-block';
                    } else if (total === 0) {
                        absentSpan.style.display = 'inline-block';
                        repeatedSpan.style.display = 'none';
                    } else {
                        absentSpan.style.display = 'none';
                        repeatedSpan.style.display = 'none';
                    }
                }
            }
        })();

        document.getElementById('dailyNameFilter').addEventListener('input', e => { const val = normalizeText(e.target.value); document.querySelectorAll('#attendanceTableBody tr').forEach(row => { const name = normalizeText(row.cells[0].innerText); row.style.display = name.includes(val) ? '' : 'none'; }); });
        document.getElementById('addStudentBtn').addEventListener('click', () => showAddStudentModal(false));
        document.getElementById('reportBtn').addEventListener('click', async () => { const end = getTodayDate(), start = getThreeWeeksAgo(); attendanceRecords = await fetchAttendanceForDateRange(currentClassId, start, end); renderReportTable(start, end); });
        document.getElementById('saveAttendance').addEventListener('click', () => saveAttendance(currentClassId, selectedDate));
        document.getElementById('attendanceDate').addEventListener('change', async e => { attendanceRecords = await fetchAttendanceForDate(currentClassId, e.target.value); renderDailyTable(e.target.value); });
        document.getElementById('logoutBtn').addEventListener('click', async () => { await supabase.auth.signOut(); init(); });
    }

    async function renderDailyAdminView(classId) {
        attendanceRecords = await fetchAttendanceForDate(classId, getTodayDate());
        renderDailyTableAdmin(classId, getTodayDate());
    }
    function renderDailyTableAdmin(classId, selectedDate) {
        let rows = '';
        for (const s of students) {
            const rec = attendanceRecords.find(r => r.student_id === s.id);
            const mass = rec?.mass_grade || 0, communion = rec?.communion_grade || 0, classG = rec?.class_grade || 0, behavior = rec?.behavior_grade || 0, notes = rec?.notes || '';
            rows += `<tr data-id="${s.id}">
                        <td><div class="name-cell"><span>${s.name}</span><span class="absent-badge" style="display:none;">⚠️ غائب</span><span class="repeated-badge" style="display:none;">⚠️ غائب مرتين</span></div></td>
                        <td><input type="number" min="0" max="10" step="10" class="mass-input" value="${mass}"></td>
                        <td><input type="number" min="0" max="10" step="10" class="communion-input" value="${communion}"></td>
                        <td><input type="number" min="0" max="10" step="10" class="class-input" value="${classG}"></td>
                        <td><select class="behavior-select">${[0,1,2,3,4,5].map(v => `<option value="${v}" ${behavior === v ? 'selected' : ''}>${v}</option>`).join('')}</select></td>
                        <td><input type="text" class="notes-input" value="${notes.replace(/"/g, '&quot;')}"></td>
                    </tr>`;
        }
        document.getElementById('adminContent').innerHTML = `
            <div><div class="header" style="border-bottom:none;"><div class="logo-container"><img src="${LOGO_URL}" class="logo-img"><span class="logo-text">تسجيل يومي</span></div><div><button class="btn btn-add" id="addStudentAdminBtn">➕ إضافة طالب</button><button class="btn btn-warning" id="reportAdminBtn">📊 التقارير</button></div></div>
            <div class="date-bar"><label>📅 التاريخ:</label><input type="date" id="attendanceDateAdmin" value="${selectedDate}"></div>
            <div><input type="text" id="dailyNameFilterAdmin" placeholder="🔍 بحث بالاسم" class="filter-input" style="width:100%; margin-bottom:20px;"></div>
            <div class="dashboard-summary" id="dashboardAdminSummary"></div>
            <div class="table-wrapper">
                <table class="attendance-table">
                    <thead><tr><th>الاسم</th><th>القداس (0/10)</th><th>التناول (0/10)</th><th>حضور الخدمة (0/10)</th><th>السلوك (0-5)</th><th>ملاحظات</th></tr></thead>
                    <tbody id="attendanceTableBodyAdmin">${rows}</tbody>
                </table>
            </div>
            <button class="save-btn" id="saveAttendanceAdmin">حفظ الحضور</button>
            <div id="message"></div></div>`;

        updateDashboard(true);
        attachTableListeners(true);
        (async () => {
            for (const s of students) {
                const repeated = await isRepeatedAbsence(s.id, selectedDate);
                const rec = attendanceRecords.find(r => r.student_id === s.id);
                const total = (rec?.mass_grade || 0) + (rec?.communion_grade || 0) + (rec?.class_grade || 0) + (rec?.behavior_grade || 0);
                const row = document.querySelector(`tr[data-id="${s.id}"]`);
                if (row) {
                    const absentSpan = row.querySelector('.absent-badge');
                    const repeatedSpan = row.querySelector('.repeated-badge');
                    if (repeated && total === 0) {
                        absentSpan.style.display = 'none';
                        repeatedSpan.style.display = 'inline-block';
                    } else if (total === 0) {
                        absentSpan.style.display = 'inline-block';
                        repeatedSpan.style.display = 'none';
                    } else {
                        absentSpan.style.display = 'none';
                        repeatedSpan.style.display = 'none';
                    }
                }
            }
        })();

        document.getElementById('dailyNameFilterAdmin').addEventListener('input', e => { const val = normalizeText(e.target.value); document.querySelectorAll('#attendanceTableBodyAdmin tr').forEach(row => { const name = normalizeText(row.cells[0].innerText); row.style.display = name.includes(val) ? '' : 'none'; }); });
        document.getElementById('addStudentAdminBtn').addEventListener('click', () => showAddStudentModal(true));
        document.getElementById('reportAdminBtn').addEventListener('click', async () => { const end = getTodayDate(), start = getThreeWeeksAgo(); attendanceRecords = await fetchAttendanceForDateRange(classId, start, end); renderReportTableAdmin(classId, start, end); });
        document.getElementById('saveAttendanceAdmin').addEventListener('click', () => saveAttendance(classId, selectedDate));
        document.getElementById('attendanceDateAdmin').addEventListener('change', async e => { attendanceRecords = await fetchAttendanceForDate(classId, e.target.value); renderDailyTableAdmin(classId, e.target.value); });
    }

    function updateDashboard(isAdmin = false) {
        const total = students.length;
        const present = attendanceRecords.filter(r => r.mass_grade === 10 && r.communion_grade === 10 && r.class_grade === 10).length;
        const massCount = attendanceRecords.filter(r => r.mass_grade === 10).length;
        const commCount = attendanceRecords.filter(r => r.communion_grade === 10).length;
        const classCount = attendanceRecords.filter(r => r.class_grade === 10).length;
        const dash = document.querySelector(isAdmin ? '#dashboardAdminSummary' : '#dashboardSummary');
        if (dash) dash.innerHTML = `<div class="stat-card"><h4>عدد المخدومين</h4><div class="value">${total}</div></div>
                                    <div class="stat-card"><h4>الحضور الكامل</h4><div class="value">${present}</div></div>
                                    <div class="stat-card"><h4>القداس (10)</h4><div class="value">${massCount}</div></div>
                                    <div class="stat-card"><h4>التناول (10)</h4><div class="value">${commCount}</div></div>
                                    <div class="stat-card"><h4>الخدمة (10)</h4><div class="value">${classCount}</div></div>`;
    }

    function attachTableListeners(isAdmin = false) {
        const tableBody = document.querySelector(isAdmin ? '#attendanceTableBodyAdmin' : '#attendanceTableBody');
        if (!tableBody) return;
        tableBody.querySelectorAll('tr').forEach(row => {
            const massInput = row.querySelector('.mass-input');
            const communionInput = row.querySelector('.communion-input');
            const classInput = row.querySelector('.class-input');
            const behaviorSelect = row.querySelector('.behavior-select');
            const updateTotal = () => {
                const mass = parseInt(massInput.value) || 0;
                const communion = parseInt(communionInput.value) || 0;
                const classG = parseInt(classInput.value) || 0;
                const behavior = parseInt(behaviorSelect.value) || 0;
                const total = mass + communion + classG + behavior;
                const absentSpan = row.querySelector('.absent-badge');
                const repeatedSpan = row.querySelector('.repeated-badge');
                // لا نغير حالة الغياب المتكرر هنا لأنها تعتمد على بيانات تاريخية، فقط نحدد إذا كان المجموع صفر
                if (total === 0 && absentSpan.style.display !== 'inline-block' && repeatedSpan.style.display !== 'inline-block') {
                    absentSpan.style.display = 'inline-block';
                    repeatedSpan.style.display = 'none';
                } else if (total !== 0) {
                    absentSpan.style.display = 'none';
                    repeatedSpan.style.display = 'none';
                }
            };
            massInput.addEventListener('input', updateTotal);
            communionInput.addEventListener('input', updateTotal);
            classInput.addEventListener('input', updateTotal);
            behaviorSelect.addEventListener('change', updateTotal);
        });
    }

    // دوال تسجيل الدخول وإدارة الجلسة
    async function init() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session?.user) {
            const { data: userData } = await supabase.from('users').select('*, classes(id, class_name)').eq('id', session.user.id).single();
            if (userData) {
                currentUser = userData; currentClassId = userData.class_id;
                if (userData.role === 'admin') { allClasses = await fetchAllClasses(); loadAdminView(); }
                else { const { data: stds } = await supabase.from('students').select('*').eq('class_id', currentClassId).eq('active', true); students = deduplicateStudents(stds || []); renderDailyView(); }
            } else renderLogin();
        } else renderLogin();
    }
    function renderLogin() {
        document.getElementById('app').innerHTML = `<div><div class="header" style="justify-content:center; border-bottom:none;"><div class="logo-container"><img src="${LOGO_URL}" class="logo-img"><span class="logo-text">خدمة خامسة وسادسة</span></div></div><div class="login-form"><h2>تسجيل الدخول</h2><input type="email" id="email" placeholder="البريد الإلكتروني"><input type="password" id="password" placeholder="كلمة السر"><button class="btn" id="loginBtn">دخول</button><div id="loginMsg"></div></div></div>`;
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value, password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) document.getElementById('loginMsg').innerHTML = `<div class="message error">${error.message}</div>`;
            else init();
        });
    }
    async function loadAdminView() {
        let options = '<option value="">اختر الفصل</option>';
        allClasses.forEach(cls => { options += `<option value="${cls.id}">${cls.class_name}</option>`; });
        document.getElementById('app').innerHTML = `<div><div class="header"><div class="logo-container"><img src="${LOGO_URL}" class="logo-img"><span class="logo-text">خدمة خامسة وسادسة</span></div><div><button class="btn btn-info" id="allClassesReportBtn">📋 تقرير شامل</button><button class="btn" id="logoutBtn">تسجيل خروج</button></div></div><div style="margin-bottom:20px;"><label>اختر الفصل: </label><select id="classSelect">${options}</select></div><div id="adminContent"></div></div>`;
        document.getElementById('logoutBtn').addEventListener('click', async () => { await supabase.auth.signOut(); init(); });
        document.getElementById('allClassesReportBtn').addEventListener('click', async () => { const end = getTodayDate(), start = getThreeWeeksAgo(); const att = await fetchAttendanceForAllClasses(start, end); const allSt = await fetchAllStudents(); renderAllClassesReport(allSt, att, start, end); });
        document.getElementById('classSelect').addEventListener('change', async e => {
            const classId = e.target.value;
            if (classId) { currentAdminClassId = classId; const { data: stds } = await supabase.from('students').select('*').eq('class_id', classId).eq('active', true); students = deduplicateStudents(stds || []); renderDailyAdminView(classId); }
            else document.getElementById('adminContent').innerHTML = '';
        });
    }

    // ربط الأحداث العامة
    document.getElementById('confirmAddStudent')?.addEventListener('click', handleAddStudent);
    document.getElementById('cancelAddStudent')?.addEventListener('click', hideAddStudentModal);
