<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحضور - مدارس الأحد</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #f3f4f6;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 24px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 16px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #1e3a8a;
        }
        .btn {
            background: #1e3a8a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover {
            background: #2563eb;
        }
        .login-form {
            max-width: 400px;
            margin: 40px auto;
            padding: 24px;
            background: #f9fafb;
            border-radius: 12px;
        }
        .login-form input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th, td {
            border: 1px solid #e5e7eb;
            padding: 12px;
            text-align: center;
        }
        th {
            background: #1e3a8a;
            color: white;
        }
        .grade-input {
            width: 70px;
            padding: 6px;
            text-align: center;
            border: 1px solid #d1d5db;
            border-radius: 4px;
        }
        .behavior-select {
            width: 70px;
            padding: 6px;
        }
        .save-btn {
            background: #059669;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 18px;
            margin-top: 20px;
            cursor: pointer;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin: 16px 0;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- يتم ملء المحتوى عبر JavaScript -->
    </div>

    <script>
        // ------------------- إعدادات Supabase (ثابتة الآن) -------------------
        const SUPABASE_URL = 'https://segqpdkygxdzzpkkgiem.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_qqYzdEF5y0fJwtL_-1ZHBQ_EUYPS3JC';
        // ---------------------------------------------------------------------

        // استخدام اسم مختلف لتجنب التعارض مع window.supabase
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let currentClassId = null;
        let students = [];

        const app = document.getElementById('app');

        async function init() {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            if (session?.user) {
                // ✅ استعلام صحيح مع جلب بيانات الفصل المرتبط
                const { data: userData, error: userError } = await supabaseClient
                    .from('users')
                    .select('*, classes(id, class_name)')
                    .eq('id', session.user.id)
                    .single();

                if (userData) {
                    currentUser = userData;
                    currentClassId = userData.class_id;
                    if (userData.role === 'admin') {
                        loadAdminView();
                    } else {
                        loadServantView();
                    }
                } else {
                    renderLogin();
                }
            } else {
                renderLogin();
            }
        }

        function renderLogin() {
            app.innerHTML = `
                <div class="login-form">
                    <h2 style="text-align:center; margin-bottom:20px;">تسجيل الدخول</h2>
                    <input type="email" id="email" placeholder="البريد الإلكتروني" />
                    <input type="password" id="password" placeholder="كلمة السر" />
                    <button class="btn" id="loginBtn" style="width:100%;">دخول</button>
                    <div id="loginMessage"></div>
                </div>
            `;
            document.getElementById('loginBtn').addEventListener('click', async () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    document.getElementById('loginMessage').innerHTML = `<div class="message error">${error.message}</div>`;
                } else {
                    init();
                }
            });
        }

        async function loadServantView() {
            const { data: stds, error } = await supabaseClient
                .from('students')
                .select('*')
                .eq('class_id', currentClassId)
                .eq('active', true);
            students = stds || [];
            renderAttendanceTable();
        }

        async function loadAdminView() {
            const { data: classes, error } = await supabaseClient.from('classes').select('*');
            let options = '<option value="">اختر الفصل</option>';
            classes.forEach(cls => {
                options += `<option value="${cls.id}">${cls.class_name}</option>`;
            });
            app.innerHTML = `
                <div>
                    <div class="header">
                        <div class="logo">نظام الحضور - الأدمن</div>
                        <button class="btn" id="logoutBtn">تسجيل خروج</button>
                    </div>
                    <div style="margin-bottom:20px;">
                        <label>اختر الفصل: </label>
                        <select id="classSelect">${options}</select>
                    </div>
                    <div id="adminTable"></div>
                </div>
            `;
            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('classSelect').addEventListener('change', async (e) => {
                const classId = e.target.value;
                if (classId) {
                    const { data: stds } = await supabaseClient.from('students').select('*').eq('class_id', classId).eq('active', true);
                    students = stds || [];
                    renderAttendanceTableForAdmin(classId);
                } else {
                    document.getElementById('adminTable').innerHTML = '';
                }
            });
        }

        function renderAttendanceTable() {
            let rows = '';
            students.forEach(s => {
                rows += `
                    <tr>
                        <td>${s.name}</td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="mass" value="0"></td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="communion" value="0"></td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="class" value="0"></td>
                        <td>
                            <select class="behavior-select" data-id="${s.id}" data-field="behavior">
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                            </select>
                        </td>
                        <td><input type="text" class="grade-input" data-id="${s.id}" data-field="notes" placeholder="ملاحظات"></td>
                    </tr>
                `;
            });
            app.innerHTML = `
                <div>
                    <div class="header">
                        <div class="logo">${currentUser?.classes?.class_name || 'الفصل'}</div>
                        <button class="btn" id="logoutBtn">تسجيل خروج</button>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>الاسم</th>
                                    <th>القداس (0/10)</th>
                                    <th>التناول (0/10)</th>
                                    <th>حضور الخدمة (0/10)</th>
                                    <th>السلوك (0-5)</th>
                                    <th>ملاحظات</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rows}
                            </tbody>
                        </table>
                    </div>
                    <button class="save-btn" id="saveAttendance">حفظ الحضور</button>
                    <div id="message"></div>
                </div>
            `;
            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('saveAttendance').addEventListener('click', saveAttendance);
        }

        function renderAttendanceTableForAdmin(classId) {
            let rows = '';
            students.forEach(s => {
                rows += `
                    <tr>
                        <td>${s.name}</td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="mass" value="0"></td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="communion" value="0"></td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="class" value="0"></td>
                        <td>
                            <select class="behavior-select" data-id="${s.id}" data-field="behavior">
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                            </select>
                        </td>
                        <td><input type="text" class="grade-input" data-id="${s.id}" data-field="notes" placeholder="ملاحظات"></td>
                    </tr>
                `;
            });
            document.getElementById('adminTable').innerHTML = `
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>الاسم</th>
                                <th>القداس (0/10)</th>
                                <th>التناول (0/10)</th>
                                <th>حضور الخدمة (0/10)</th>
                                <th>السلوك (0-5)</th>
                                <th>ملاحظات</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows}
                        </tbody>
                    </table>
                </div>
                <button class="save-btn" id="saveAttendanceAdmin">حفظ الحضور</button>
                <div id="message"></div>
            `;
            document.getElementById('saveAttendanceAdmin').addEventListener('click', () => saveAttendance(classId));
        }

        async function saveAttendance(classIdForAdmin = null) {
            const classId = classIdForAdmin || currentClassId;
            const date = new Date().toISOString().split('T')[0];
            const records = [];
            const inputs = document.querySelectorAll('[data-id]');
            const studentMap = new Map();
            inputs.forEach(inp => {
                const studentId = inp.dataset.id;
                const field = inp.dataset.field;
                if (!studentMap.has(studentId)) {
                    studentMap.set(studentId, { student_id: studentId, mass: 0, communion: 0, class: 0, behavior: 0, notes: '' });
                }
                const studentRecord = studentMap.get(studentId);
                if (field === 'mass') studentRecord.mass = parseInt(inp.value) || 0;
                if (field === 'communion') studentRecord.communion = parseInt(inp.value) || 0;
                if (field === 'class') studentRecord.class = parseInt(inp.value) || 0;
                if (field === 'behavior') studentRecord.behavior = parseInt(inp.value) || 0;
                if (field === 'notes') studentRecord.notes = inp.value;
            });

            for (let [studentId, rec] of studentMap) {
                records.push({
                    student_id: studentId,
                    date: date,
                    mass_grade: rec.mass,
                    communion_grade: rec.communion,
                    class_grade: rec.class,
                    behavior_grade: rec.behavior,
                    notes: rec.notes,
                    recorded_by: currentUser.id
                });
            }

            let hasError = false;
            for (let rec of records) {
                const { error } = await supabaseClient.from('attendance').insert(rec);
                if (error) {
                    console.error(error);
                    hasError = true;
                }
            }
            const msgDiv = document.getElementById('message');
            if (hasError) {
                msgDiv.innerHTML = '<div class="message error">حدث خطأ أثناء الحفظ، بعض السجلات قد لا تكون محفوظة.</div>';
            } else {
                msgDiv.innerHTML = '<div class="message success">تم حفظ الحضور بنجاح</div>';
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            init();
        }

        // رسالة تأكيد أن الملف الجديد يعمل
        console.log('الملف الجديد يعمل');

        init();
    </script>
</body>
</html>
