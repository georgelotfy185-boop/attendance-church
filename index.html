<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>نظام الحضور - مدارس الأحد</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #f0f2f5;
            padding: 12px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 20px;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 15px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn {
            background: #1e3a8a;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        .btn:hover {
            background: #2563eb;
        }
        .btn-secondary {
            background: #6b7280;
        }
        .btn-secondary:hover {
            background: #4b5563;
        }
        .login-form {
            max-width: 380px;
            margin: 30px auto;
            padding: 30px;
            background: #f9fafb;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .login-form h2 {
            margin-bottom: 20px;
            color: #1e3a8a;
            font-size: 28px;
        }
        .login-form input {
            width: 100%;
            padding: 14px;
            margin: 8px 0 20px;
            border: 1px solid #d1d5db;
            border-radius: 16px;
            font-size: 16px;
        }
        .login-form input:focus {
            border-color: #1e3a8a;
            outline: none;
        }
        .date-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            background: #f9fafb;
            padding: 15px;
            border-radius: 16px;
            flex-wrap: wrap;
        }
        .date-bar label {
            font-weight: 600;
            color: #374151;
        }
        .date-bar input[type="date"] {
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 16px;
            background: white;
        }
        .dashboard-summary {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            background: #f9fafb;
            padding: 20px;
            border-radius: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            flex: 1 1 160px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-card h4 {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: #1e3a8a;
        }
        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 20px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        th {
            background: #1e3a8a;
            color: white;
            font-weight: 600;
            padding: 16px 12px;
            font-size: 15px;
        }
        td {
            border: 1px solid #e5e7eb;
            padding: 12px;
            text-align: center;
            background: white;
        }
        .grade-input {
            width: 70px;
            padding: 8px;
            text-align: center;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
        }
        .behavior-select {
            width: 70px;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            background: white;
        }
        .total-grade {
            font-weight: 700;
            color: #1e3a8a;
            background: #e0f2fe;
            border-radius: 8px;
            padding: 5px 0;
            min-width: 50px;
            display: inline-block;
        }
        .absent-warning {
            background-color: #fee2e2;
            color: #b91c1c;
            font-weight: 600;
            border-radius: 20px;
            padding: 4px 8px;
            font-size: 13px;
            display: inline-block;
            margin-left: 5px;
        }
        .save-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(16,185,129,0.3);
            transition: background 0.2s;
            margin-top: 10px;
        }
        .save-btn:hover {
            background: #059669;
        }
        .message {
            padding: 14px;
            border-radius: 16px;
            margin: 20px 0;
            text-align: center;
            font-weight: 500;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        // ------------------- إعدادات Supabase (ثابتة) -------------------
        const SUPABASE_URL = 'https://segqpdkygxdzzpkkgiem.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlZ3FwZGt5Z3hkenpwa2tnaWVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NDQzOTMsImV4cCI6MjA4NzUyMDM5M30.wPx74fmu93ii-tm6iIeyPucRsNnSA8SFUsHhJitp1bs';
        // ----------------------------------------------------------------

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let currentClassId = null;
        let students = [];
        let attendanceRecords = [];

        const app = document.getElementById('app');

        function getTodayDate() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        async function fetchAttendanceForDate(classId, date) {
            if (!classId || !students.length) return [];
            const studentIds = students.map(s => s.id);
            const { data, error } = await supabaseClient
                .from('attendance')
                .select('*')
                .in('student_id', studentIds)
                .eq('date', date);
            if (error) {
                console.error('Error fetching attendance:', error);
                return [];
            }
            return data || [];
        }

        // دالة لحساب المجموع لطالب بناءً على قيم الحقول
        function calculateTotal(row) {
            const mass = parseInt(row.querySelector('[data-field="mass"]')?.value) || 0;
            const communion = parseInt(row.querySelector('[data-field="communion"]')?.value) || 0;
            const classGrade = parseInt(row.querySelector('[data-field="class"]')?.value) || 0;
            const behavior = parseInt(row.querySelector('[data-field="behavior"]')?.value) || 0;
            return mass + communion + classGrade + behavior;
        }

        // دالة لتحديث المجموع في صف معين وإظهار/إخفاء تحذير الغياب
        function updateRowTotal(row) {
            const totalCell = row.querySelector('.total-grade');
            if (!totalCell) return;
            const total = calculateTotal(row);
            totalCell.textContent = total;

            // تحديث تحذير الغياب إذا كان المجموع صفر
            const nameCell = row.cells[0];
            let warningSpan = nameCell.querySelector('.absent-warning');
            if (total === 0) {
                if (!warningSpan) {
                    const studentName = nameCell.childNodes[0]?.nodeValue || '';
                    nameCell.innerHTML = `${studentName} <span class="absent-warning">⚠️ غائب</span>`;
                }
            } else {
                if (warningSpan) warningSpan.remove();
            }
        }

        // دالة لحساب الإحصائيات وعرضها
        function updateDashboard() {
            const totalStudents = students.length;
            let presentCount = 0;
            let totalMass = 0, totalCommunion = 0, totalClass = 0, totalBehavior = 0;
            let sumTotal = 0;

            document.querySelectorAll('tbody tr').forEach(row => {
                const mass = parseInt(row.querySelector('[data-field="mass"]')?.value) || 0;
                const communion = parseInt(row.querySelector('[data-field="communion"]')?.value) || 0;
                const classGrade = parseInt(row.querySelector('[data-field="class"]')?.value) || 0;
                const behavior = parseInt(row.querySelector('[data-field="behavior"]')?.value) || 0;
                const total = mass + communion + classGrade + behavior;

                totalMass += mass;
                totalCommunion += communion;
                totalClass += classGrade;
                totalBehavior += behavior;
                sumTotal += total;

                if (mass === 10 && communion === 10 && classGrade === 10) presentCount++;
            });

            const avgMass = totalStudents ? (totalMass / totalStudents).toFixed(1) : 0;
            const avgCommunion = totalStudents ? (totalCommunion / totalStudents).toFixed(1) : 0;
            const avgClass = totalStudents ? (totalClass / totalStudents).toFixed(1) : 0;
            const avgBehavior = totalStudents ? (totalBehavior / totalStudents).toFixed(1) : 0;
            const avgTotal = totalStudents ? (sumTotal / totalStudents).toFixed(1) : 0;

            // تحديث لوحة الإحصائيات
            const dashboard = document.querySelector('.dashboard-summary');
            if (dashboard) {
                dashboard.innerHTML = `
                    <div class="stat-card">
                        <h4>عدد الطلاب</h4>
                        <div class="value">${totalStudents}</div>
                    </div>
                    <div class="stat-card">
                        <h4>الحضور الكامل</h4>
                        <div class="value">${presentCount}</div>
                    </div>
                    <div class="stat-card">
                        <h4>متوسط القداس</h4>
                        <div class="value">${avgMass}</div>
                    </div>
                    <div class="stat-card">
                        <h4>متوسط التناول</h4>
                        <div class="value">${avgCommunion}</div>
                    </div>
                    <div class="stat-card">
                        <h4>متوسط الخدمة</h4>
                        <div class="value">${avgClass}</div>
                    </div>
                    <div class="stat-card">
                        <h4>متوسط السلوك</h4>
                        <div class="value">${avgBehavior}</div>
                    </div>
                    <div class="stat-card">
                        <h4>متوسط المجموع</h4>
                        <div class="value">${avgTotal}</div>
                    </div>
                `;
            }
        }

        // دالة لربط مستمعي الأحداث بكل حقول الإدخال لتحديث المجموع فوراً
        function attachInputListeners() {
            document.querySelectorAll('[data-field="mass"], [data-field="communion"], [data-field="class"], [data-field="behavior"]').forEach(input => {
                input.removeEventListener('input', inputHandler);
                input.addEventListener('input', inputHandler);
            });
        }

        function inputHandler(e) {
            const row = e.target.closest('tr');
            if (row) {
                updateRowTotal(row);
                updateDashboard();
            }
        }

        async function init() {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            if (session?.user) {
                const { data: userData, error: userError } = await supabaseClient
                    .from('users')
                    .select('*, classes(id, class_name)')
                    .eq('id', session.user.id)
                    .single();

                if (userData) {
                    currentUser = userData;
                    currentClassId = userData.class_id;
                    if (userData.role === 'admin') {
                        loadAdminView();
                    } else {
                        loadServantView();
                    }
                } else {
                    renderLogin();
                }
            } else {
                renderLogin();
            }
        }

        function renderLogin() {
            app.innerHTML = `
                <div class="login-form">
                    <h2 style="text-align:center;">تسجيل الدخول</h2>
                    <input type="email" id="email" placeholder="البريد الإلكتروني" />
                    <input type="password" id="password" placeholder="كلمة السر" />
                    <button class="btn" id="loginBtn" style="width:100%;">دخول</button>
                    <div id="loginMessage" style="margin-top:15px;"></div>
                </div>
            `;
            document.getElementById('loginBtn').addEventListener('click', async () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    document.getElementById('loginMessage').innerHTML = `<div class="message error">${error.message}</div>`;
                } else {
                    init();
                }
            });
        }

        async function loadServantView() {
            const { data: stds, error } = await supabaseClient
                .from('students')
                .select('*')
                .eq('class_id', currentClassId)
                .eq('active', true);
            students = stds || [];

            const today = getTodayDate();
            attendanceRecords = await fetchAttendanceForDate(currentClassId, today);
            renderAttendanceTable(today);
        }

        async function loadAdminView() {
            const { data: classes, error } = await supabaseClient.from('classes').select('*');
            let options = '<option value="">اختر الفصل</option>';
            classes.forEach(cls => {
                options += `<option value="${cls.id}">${cls.class_name}</option>`;
            });
            app.innerHTML = `
                <div>
                    <div class="header">
                        <div class="logo">نظام الحضور - الأدمن</div>
                        <button class="btn" id="logoutBtn">تسجيل خروج</button>
                    </div>
                    <div style="margin-bottom:20px;">
                        <label>اختر الفصل: </label>
                        <select id="classSelect" style="padding:8px; border-radius:12px; margin-right:10px;">${options}</select>
                    </div>
                    <div id="adminDashboard"></div>
                </div>
            `;
            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('classSelect').addEventListener('change', async (e) => {
                const classId = e.target.value;
                if (classId) {
                    const { data: stds } = await supabaseClient.from('students').select('*').eq('class_id', classId).eq('active', true);
                    students = stds || [];
                    const today = getTodayDate();
                    attendanceRecords = await fetchAttendanceForDate(classId, today);
                    renderAttendanceTableForAdmin(classId, today);
                } else {
                    document.getElementById('adminDashboard').innerHTML = '';
                }
            });
        }

        function renderAttendanceTable(selectedDate) {
            let rows = '';
            students.forEach(s => {
                const record = attendanceRecords.find(r => r.student_id === s.id);
                const mass = record ? record.mass_grade : 0;
                const communion = record ? record.communion_grade : 0;
                const classGrade = record ? record.class_grade : 0;
                const behavior = record ? record.behavior_grade : 0;
                const notes = record ? record.notes || '' : '';
                const total = mass + communion + classGrade + behavior;
                const warning = (total === 0) ? ' <span class="absent-warning">⚠️ غائب</span>' : '';

                rows += `
                    <tr>
                        <td>${s.name}${warning}</td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="mass" value="${mass}"></td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="communion" value="${communion}"></td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="class" value="${classGrade}"></td>
                        <td>
                            <select class="behavior-select" data-id="${s.id}" data-field="behavior">
                                <option value="0" ${behavior === 0 ? 'selected' : ''}>0</option>
                                <option value="1" ${behavior === 1 ? 'selected' : ''}>1</option>
                                <option value="2" ${behavior === 2 ? 'selected' : ''}>2</option>
                                <option value="3" ${behavior === 3 ? 'selected' : ''}>3</option>
                                <option value="4" ${behavior === 4 ? 'selected' : ''}>4</option>
                                <option value="5" ${behavior === 5 ? 'selected' : ''}>5</option>
                            </select>
                        </td>
                        <td><input type="text" class="grade-input" data-id="${s.id}" data-field="notes" placeholder="..." value="${notes}"></td>
                        <td class="total-grade">${total}</td>
                    </tr>
                `;
            });

            app.innerHTML = `
                <div>
                    <div class="header">
                        <div class="logo">${currentUser?.classes?.class_name || 'الفصل'}</div>
                        <button class="btn" id="logoutBtn">تسجيل خروج</button>
                    </div>
                    <div class="date-bar">
                        <label>📅 التاريخ:</label>
                        <input type="date" id="attendanceDate" value="${selectedDate}">
                    </div>
                    <div class="dashboard-summary"></div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>الاسم</th>
                                    <th>القداس (0/10)</th>
                                    <th>التناول (0/10)</th>
                                    <th>حضور الخدمة (0/10)</th>
                                    <th>السلوك (0-5)</th>
                                    <th>ملاحظات</th>
                                    <th>المجموع</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rows}
                            </tbody>
                        </table>
                    </div>
                    <button class="save-btn" id="saveAttendance">حفظ الحضور</button>
                    <div id="message"></div>
                </div>
            `;

            // ربط مستمعي الأحداث للحقول
            attachInputListeners();

            // تحديث لوحة الإحصائيات
            updateDashboard();

            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('saveAttendance').addEventListener('click', () => saveAttendance(currentClassId));
            document.getElementById('attendanceDate').addEventListener('change', async (e) => {
                const newDate = e.target.value;
                attendanceRecords = await fetchAttendanceForDate(currentClassId, newDate);
                renderAttendanceTable(newDate);
            });
        }

        function renderAttendanceTableForAdmin(classId, selectedDate) {
            let rows = '';
            students.forEach(s => {
                const record = attendanceRecords.find(r => r.student_id === s.id);
                const mass = record ? record.mass_grade : 0;
                const communion = record ? record.communion_grade : 0;
                const classGrade = record ? record.class_grade : 0;
                const behavior = record ? record.behavior_grade : 0;
                const notes = record ? record.notes || '' : '';
                const total = mass + communion + classGrade + behavior;
                const warning = (total === 0) ? ' <span class="absent-warning">⚠️ غائب</span>' : '';

                rows += `
                    <tr>
                        <td>${s.name}${warning}</td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="mass" value="${mass}"></td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="communion" value="${communion}"></td>
                        <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="class" value="${classGrade}"></td>
                        <td>
                            <select class="behavior-select" data-id="${s.id}" data-field="behavior">
                                <option value="0" ${behavior === 0 ? 'selected' : ''}>0</option>
                                <option value="1" ${behavior === 1 ? 'selected' : ''}>1</option>
                                <option value="2" ${behavior === 2 ? 'selected' : ''}>2</option>
                                <option value="3" ${behavior === 3 ? 'selected' : ''}>3</option>
                                <option value="4" ${behavior === 4 ? 'selected' : ''}>4</option>
                                <option value="5" ${behavior === 5 ? 'selected' : ''}>5</option>
                            </select>
                        </td>
                        <td><input type="text" class="grade-input" data-id="${s.id}" data-field="notes" placeholder="..." value="${notes}"></td>
                        <td class="total-grade">${total}</td>
                    </tr>
                `;
            });

            document.getElementById('adminDashboard').innerHTML = `
                <div class="date-bar">
                    <label>📅 التاريخ:</label>
                    <input type="date" id="attendanceDateAdmin" value="${selectedDate}">
                </div>
                <div class="dashboard-summary"></div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>الاسم</th>
                                <th>القداس (0/10)</th>
                                <th>التناول (0/10)</th>
                                <th>حضور الخدمة (0/10)</th>
                                <th>السلوك (0-5)</th>
                                <th>ملاحظات</th>
                                <th>المجموع</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows}
                        </tbody>
                    </table>
                </div>
                <button class="save-btn" id="saveAttendanceAdmin">حفظ الحضور</button>
                <div id="message"></div>
            `;

            // ربط مستمعي الأحداث للحقول
            attachInputListeners();

            // تحديث لوحة الإحصائيات
            updateDashboard();

            document.getElementById('saveAttendanceAdmin').addEventListener('click', () => saveAttendance(classId));
            document.getElementById('attendanceDateAdmin').addEventListener('change', async (e) => {
                const newDate = e.target.value;
                attendanceRecords = await fetchAttendanceForDate(classId, newDate);
                renderAttendanceTableForAdmin(classId, newDate);
            });
        }

        async function saveAttendance(classIdForAdmin = null) {
            const classId = classIdForAdmin || currentClassId;
            const dateInput = classIdForAdmin ? document.getElementById('attendanceDateAdmin') : document.getElementById('attendanceDate');
            const selectedDate = dateInput ? dateInput.value : getTodayDate();

            const records = [];
            const inputs = document.querySelectorAll('[data-id]');
            const studentMap = new Map();

            inputs.forEach(inp => {
                const studentId = inp.dataset.id;
                const field = inp.dataset.field;
                if (!studentMap.has(studentId)) {
                    studentMap.set(studentId, { student_id: studentId, mass: 0, communion: 0, class: 0, behavior: 0, notes: '' });
                }
                const rec = studentMap.get(studentId);
                if (field === 'mass') rec.mass = parseInt(inp.value) || 0;
                if (field === 'communion') rec.communion = parseInt(inp.value) || 0;
                if (field === 'class') rec.class = parseInt(inp.value) || 0;
                if (field === 'behavior') rec.behavior = parseInt(inp.value) || 0;
                if (field === 'notes') rec.notes = inp.value;
            });

            for (let [studentId, rec] of studentMap) {
                records.push({
                    student_id: studentId,
                    date: selectedDate,
                    mass_grade: rec.mass,
                    communion_grade: rec.communion,
                    class_grade: rec.class,
                    behavior_grade: rec.behavior,
                    notes: rec.notes,
                    recorded_by: currentUser.id
                });
            }

            let hasError = false;
            for (let rec of records) {
                const { error } = await supabaseClient.from('attendance').upsert(rec, { onConflict: 'student_id, date' });
                if (error) {
                    console.error(error);
                    hasError = true;
                }
            }

            const msgDiv = document.getElementById('message');
            if (hasError) {
                msgDiv.innerHTML = '<div class="message error">حدث خطأ أثناء الحفظ، بعض السجلات قد لا تكون محفوظة.</div>';
            } else {
                msgDiv.innerHTML = '<div class="message success">تم حفظ الحضور بنجاح</div>';
                // تحديث attendanceRecords بعد الحفظ
                attendanceRecords = await fetchAttendanceForDate(classId, selectedDate);
                // إعادة رسم الجدول
                if (classIdForAdmin) {
                    renderAttendanceTableForAdmin(classId, selectedDate);
                } else {
                    renderAttendanceTable(selectedDate);
                }
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            init();
        }

        console.log('الملف الجديد يعمل مع التحديث التلقائي');
        init();
    </script>
</body>
</html>
