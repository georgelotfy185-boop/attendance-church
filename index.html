<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>نظام الحضور - مدارس الأحد</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- إضافة مكتبة xlsx لتصدير Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #f0f2f5;
            padding: 12px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 20px;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 15px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn {
            background: #1e3a8a;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
            margin: 5px;
        }
        .btn:hover {
            background: #2563eb;
        }
        .btn-success {
            background: #10b981;
        }
        .btn-success:hover {
            background: #059669;
        }
        .login-form {
            max-width: 380px;
            margin: 30px auto;
            padding: 30px;
            background: #f9fafb;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .login-form h2 {
            margin-bottom: 20px;
            color: #1e3a8a;
            font-size: 28px;
        }
        .login-form input {
            width: 100%;
            padding: 14px;
            margin: 8px 0 20px;
            border: 1px solid #d1d5db;
            border-radius: 16px;
            font-size: 16px;
        }
        .login-form input:focus {
            border-color: #1e3a8a;
            outline: none;
        }
        .date-range {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-bottom: 25px;
            background: #f9fafb;
            padding: 20px;
            border-radius: 20px;
        }
        .date-range label {
            font-weight: 600;
            color: #374151;
        }
        .date-range input[type="date"] {
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 16px;
            background: white;
        }
        .dashboard-summary {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            background: #f9fafb;
            padding: 20px;
            border-radius: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            flex: 1 1 160px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-card h4 {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: #1e3a8a;
        }
        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 20px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        th {
            background: #1e3a8a;
            color: white;
            font-weight: 600;
            padding: 16px 12px;
            font-size: 15px;
        }
        td {
            border: 1px solid #e5e7eb;
            padding: 12px;
            text-align: center;
            background: white;
        }
        .grade-input {
            width: 70px;
            padding: 8px;
            text-align: center;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
        }
        .behavior-select {
            width: 70px;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            background: white;
        }
        .total-grade {
            font-weight: 700;
            color: #1e3a8a;
            background: #e0f2fe;
            border-radius: 8px;
            padding: 5px 0;
            min-width: 50px;
            display: inline-block;
        }
        .absent-warning {
            background-color: #fee2e2;
            color: #b91c1c;
            font-weight: 600;
            border-radius: 20px;
            padding: 4px 8px;
            font-size: 13px;
            display: inline-block;
            margin-left: 5px;
        }
        .repeated-absence {
            background-color: #fef3c7;
            color: #92400e;
            font-weight: 600;
            border-radius: 20px;
            padding: 4px 8px;
            font-size: 13px;
            display: inline-block;
            margin-left: 5px;
        }
        .save-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(16,185,129,0.3);
            transition: background 0.2s;
            margin-top: 10px;
        }
        .save-btn:hover {
            background: #059669;
        }
        .message {
            padding: 14px;
            border-radius: 16px;
            margin: 20px 0;
            text-align: center;
            font-weight: 500;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
        }
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        // ------------------- إعدادات Supabase (ثابتة) -------------------
        const SUPABASE_URL = 'https://segqpdkygxdzzpkkgiem.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlZ3FwZGt5Z3hkenpwa2tnaWVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NDQzOTMsImV4cCI6MjA4NzUyMDM5M30.wPx74fmu93ii-tm6iIeyPucRsNnSA8SFUsHhJitp1bs';
        // ----------------------------------------------------------------

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let currentClassId = null;
        let students = [];
        let attendanceRecords = []; // سجلات الحضور للفترة الحالية

        const app = document.getElementById('app');

        // دالة للحصول على تاريخ اليوم
        function getTodayDate() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        // دالة للحصول على تاريخ قبل 21 يوماً (ثلاثة أسابيع)
        function getThreeWeeksAgo() {
            const date = new Date();
            date.setDate(date.getDate() - 21);
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        // دالة لجلب سجلات الحضور لنطاق تاريخي
        async function fetchAttendanceForDateRange(classId, startDate, endDate) {
            if (!classId || !students.length) return [];
            const studentIds = students.map(s => s.id);
            const { data, error } = await supabaseClient
                .from('attendance')
                .select('*')
                .in('student_id', studentIds)
                .gte('date', startDate)
                .lte('date', endDate)
                .order('date', { ascending: true });
            if (error) {
                console.error('Error fetching attendance:', error);
                return [];
            }
            return data || [];
        }

        // دالة لحساب المجموع لطالب بناءً على قيم الحقول (لصف واحد)
        function calculateTotalFromRow(row) {
            const mass = parseInt(row.querySelector('[data-field="mass"]')?.value) || 0;
            const communion = parseInt(row.querySelector('[data-field="communion"]')?.value) || 0;
            const classGrade = parseInt(row.querySelector('[data-field="class"]')?.value) || 0;
            const behavior = parseInt(row.querySelector('[data-field="behavior"]')?.value) || 0;
            return mass + communion + classGrade + behavior;
        }

        // دالة لتحديث المجموع في صف معين وإظهار/إخفاء تحذير الغياب
        function updateRowTotal(row) {
            const totalCell = row.querySelector('.total-grade');
            if (!totalCell) return;
            const total = calculateTotalFromRow(row);
            totalCell.textContent = total;

            // تحديث تحذير الغياب إذا كان المجموع صفر
            const nameCell = row.cells[0];
            let warningSpan = nameCell.querySelector('.absent-warning');
            if (total === 0) {
                if (!warningSpan) {
                    const studentName = nameCell.childNodes[0]?.nodeValue || '';
                    nameCell.innerHTML = `${studentName} <span class="absent-warning">⚠️ غائب</span>`;
                }
            } else {
                if (warningSpan) warningSpan.remove();
            }
        }

        // دالة لحساب الإحصائيات للفترة
        function updateDashboard() {
            const totalStudents = students.length;
            let presentCount = 0; // عدد الحضور الكامل في آخر يوم في الفترة (للتبسيط نأخذ آخر يوم)
            let massCount = 0;
            let communionCount = 0;
            let classCount = 0;

            // نأخذ آخر تاريخ في الفترة (يمكن تحسينها لاحقاً)
            if (attendanceRecords.length > 0) {
                const lastDate = attendanceRecords[attendanceRecords.length - 1].date;
                const lastDayRecords = attendanceRecords.filter(r => r.date === lastDate);
                lastDayRecords.forEach(rec => {
                    if (rec.mass_grade === 10) massCount++;
                    if (rec.communion_grade === 10) communionCount++;
                    if (rec.class_grade === 10) classCount++;
                    if (rec.mass_grade === 10 && rec.communion_grade === 10 && rec.class_grade === 10) presentCount++;
                });
            }

            const dashboard = document.querySelector('.dashboard-summary');
            if (dashboard) {
                dashboard.innerHTML = `
                    <div class="stat-card">
                        <h4>عدد المخدومين</h4>
                        <div class="value">${totalStudents}</div>
                    </div>
                    <div class="stat-card">
                        <h4>الحضور الكامل</h4>
                        <div class="value">${presentCount}</div>
                    </div>
                    <div class="stat-card">
                        <h4>القداس (10)</h4>
                        <div class="value">${massCount}</div>
                    </div>
                    <div class="stat-card">
                        <h4>التناول (10)</h4>
                        <div class="value">${communionCount}</div>
                    </div>
                    <div class="stat-card">
                        <h4>الخدمة (10)</h4>
                        <div class="value">${classCount}</div>
                    </div>
                `;
            }
        }

        // دالة لربط مستمعي الأحداث للحقول
        function attachInputListeners() {
            document.querySelectorAll('[data-field="mass"], [data-field="communion"], [data-field="class"], [data-field="behavior"]').forEach(input => {
                input.removeEventListener('input', inputHandler);
                input.addEventListener('input', inputHandler);
            });
        }

        function inputHandler(e) {
            const row = e.target.closest('tr');
            if (row) {
                updateRowTotal(row);
                // تحديث dashboard بعد تغيير القيم (اختياري)
                // updateDashboard(); // قد يكون مكلفاً، نتركه للحفظ
            }
        }

        // دالة لتصدير البيانات إلى Excel
        function exportToExcel() {
            // تجهيز البيانات
            const wsData = [];
            // عنوان الجدول
            const headers = ['الاسم', 'القداس (0/10)', 'التناول (0/10)', 'حضور الخدمة (0/10)', 'السلوك (0-5)', 'ملاحظات', 'المجموع'];
            wsData.push(headers);

            // صفوف البيانات
            const rows = document.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const name = row.cells[0].childNodes[0]?.nodeValue?.trim() || ''; // نأخذ النص الأول (بدون التحذيرات)
                const mass = row.querySelector('[data-field="mass"]')?.value || 0;
                const communion = row.querySelector('[data-field="communion"]')?.value || 0;
                const classGrade = row.querySelector('[data-field="class"]')?.value || 0;
                const behavior = row.querySelector('[data-field="behavior"]')?.value || 0;
                const notes = row.querySelector('[data-field="notes"]')?.value || '';
                const total = row.querySelector('.total-grade')?.textContent || 0;
                wsData.push([name, mass, communion, classGrade, behavior, notes, total]);
            });

            // إنشاء ورقة عمل
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            XLSX.utils.book_append_sheet(wb, ws, 'تقرير الحضور');
            // تحميل الملف
            const fileName = `تقرير_${currentUser?.classes?.class_name || 'الفصل'}_${new Date().toLocaleDateString()}.xlsx`;
            XLSX.writeFile(wb, fileName);
        }

        // دالة للتحقق من الغياب المتكرر (مرتين متتاليتين)
        function hasRepeatedAbsence(studentId, attendanceList) {
            // نحتاج سجلات الطالب مرتبة حسب التاريخ
            const studentRecords = attendanceList
                .filter(r => r.student_id === studentId)
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            // نبحث عن أي سجلين متتاليين يكون فيهما total = 0 (أو يمكننا اعتبار غياب إذا كانت mass=0)
            // سنعتبر غياباً إذا كانت mass=0 و communion=0 و class=0 (أو يمكن تعديل المعايير)
            for (let i = 0; i < studentRecords.length - 1; i++) {
                const r1 = studentRecords[i];
                const r2 = studentRecords[i+1];
                const total1 = (r1.mass_grade || 0) + (r1.communion_grade || 0) + (r1.class_grade || 0) + (r1.behavior_grade || 0);
                const total2 = (r2.mass_grade || 0) + (r2.communion_grade || 0) + (r2.class_grade || 0) + (r2.behavior_grade || 0);
                // نعتبر غائباً إذا كان المجموع أقل من 10 مثلاً (أو 0)
                if (total1 === 0 && total2 === 0) {
                    return true;
                }
            }
            return false;
        }

        async function init() {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            if (session?.user) {
                const { data: userData, error: userError } = await supabaseClient
                    .from('users')
                    .select('*, classes(id, class_name)')
                    .eq('id', session.user.id)
                    .single();

                if (userData) {
                    currentUser = userData;
                    currentClassId = userData.class_id;
                    if (userData.role === 'admin') {
                        loadAdminView();
                    } else {
                        loadServantView();
                    }
                } else {
                    renderLogin();
                }
            } else {
                renderLogin();
            }
        }

        function renderLogin() {
            app.innerHTML = `
                <div class="login-form">
                    <h2 style="text-align:center;">تسجيل الدخول</h2>
                    <input type="email" id="email" placeholder="البريد الإلكتروني" />
                    <input type="password" id="password" placeholder="كلمة السر" />
                    <button class="btn" id="loginBtn" style="width:100%;">دخول</button>
                    <div id="loginMessage" style="margin-top:15px;"></div>
                </div>
            `;
            document.getElementById('loginBtn').addEventListener('click', async () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    document.getElementById('loginMessage').innerHTML = `<div class="message error">${error.message}</div>`;
                } else {
                    init();
                }
            });
        }

        async function loadServantView() {
            const { data: stds, error } = await supabaseClient
                .from('students')
                .select('*')
                .eq('class_id', currentClassId)
                .eq('active', true);
            students = stds || [];

            // تعيين نطاق تاريخ افتراضي: آخر 21 يوماً
            const endDate = getTodayDate();
            const startDate = getThreeWeeksAgo();

            attendanceRecords = await fetchAttendanceForDateRange(currentClassId, startDate, endDate);
            renderAttendanceTable(startDate, endDate);
        }

        async function loadAdminView() {
            const { data: classes, error } = await supabaseClient.from('classes').select('*');
            let options = '<option value="">اختر الفصل</option>';
            classes.forEach(cls => {
                options += `<option value="${cls.id}">${cls.class_name}</option>`;
            });
            app.innerHTML = `
                <div>
                    <div class="header">
                        <div class="logo">نظام الحضور - الأدمن</div>
                        <button class="btn" id="logoutBtn">تسجيل خروج</button>
                    </div>
                    <div style="margin-bottom:20px;">
                        <label>اختر الفصل: </label>
                        <select id="classSelect" style="padding:8px; border-radius:12px; margin-right:10px;">${options}</select>
                    </div>
                    <div id="adminDashboard"></div>
                </div>
            `;
            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('classSelect').addEventListener('change', async (e) => {
                const classId = e.target.value;
                if (classId) {
                    const { data: stds } = await supabaseClient.from('students').select('*').eq('class_id', classId).eq('active', true);
                    students = stds || [];
                    const endDate = getTodayDate();
                    const startDate = getThreeWeeksAgo();
                    attendanceRecords = await fetchAttendanceForDateRange(classId, startDate, endDate);
                    renderAttendanceTableForAdmin(classId, startDate, endDate);
                } else {
                    document.getElementById('adminDashboard').innerHTML = '';
                }
            });
        }

        function renderAttendanceTable(startDate, endDate) {
            // بناء الجدول مع عرض إجمالي لكل طالب خلال الفترة (نعرض آخر يوم أو نعرض كل يوم؟)
            // هنا سنعرض جدولاً لكل طالب مع درجاته في كل تاريخ خلال الفترة (أكثر تفصيلاً)
            // لكن الواجهة الحالية تعرض صفاً واحداً لكل طالب بدرجات يوم واحد. لتقرير الفترة، الأفضل عرض جدولين أو تقرير منفصل.
            // سنقوم بإنشاء تقرير موجز: نعرض لكل طالب متوسط درجاته أو إجمالي حضور.
            // ولكن لتبسيط، سأعرض جدولاً بكل الأيام (لكل طالب صف لكل يوم). هذا قد يكون طويلاً.
            // بدلاً من ذلك، سأعرض لكل طالب صفاً واحداً يوضح عدد مرات الحضور ومتوسط الدرجات.
            // هذا يتطلب تغيير بنية الجدول. ولكن التحديد المطلوب هو "تقرير حضور لثلاثة أسابيع"، فالأفضل عرض جدول بالمخدومين وتفاصيلهم لكل يوم.

            // سأقوم بعمل تقرير بحيث يكون لكل طالب صف، ولكل يوم عمود. هذا أكثر تعقيداً.
            // نظراً للوقت، سأعرض الجدول التقليدي (يوم واحد) مع إضافة إمكانية تغيير النطاق وعرض إجمالي الفترة في dashboard.
            // ثم يمكن للمستخدم تصدير Excel الذي سيحتوي على كل السجلات.

            // سنقوم بإنشاء جدول يعرض جميع سجلات الفترة (لكل طالب عدة أسطر)
            // هذا سيكون أكثر فائدة.

            // تجميع التواريخ الفريدة
            const dates = [...new Set(attendanceRecords.map(r => r.date))].sort();

            let rows = '';
            students.forEach(s => {
                const studentRecords = attendanceRecords.filter(r => r.student_id === s.id);
                if (studentRecords.length === 0) {
                    // لا توجد سجلات للطالب في الفترة
                    rows += `<tr><td colspan="7" style="text-align:right;">${s.name} - لا توجد بيانات</td></tr>`;
                } else {
                    studentRecords.sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(rec => {
                        const mass = rec.mass_grade || 0;
                        const communion = rec.communion_grade || 0;
                        const classGrade = rec.class_grade || 0;
                        const behavior = rec.behavior_grade || 0;
                        const notes = rec.notes || '';
                        const total = mass + communion + classGrade + behavior;
                        const repeated = hasRepeatedAbsence(s.id, attendanceRecords) ? ' <span class="repeated-absence">⚠️ غاب مرتين</span>' : '';
                        rows += `
                            <tr>
                                <td>${s.name}${repeated}</td>
                                <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="mass" value="${mass}" data-date="${rec.date}"></td>
                                <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="communion" value="${communion}" data-date="${rec.date}"></td>
                                <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="class" value="${classGrade}" data-date="${rec.date}"></td>
                                <td>
                                    <select class="behavior-select" data-id="${s.id}" data-field="behavior" data-date="${rec.date}">
                                        <option value="0" ${behavior === 0 ? 'selected' : ''}>0</option>
                                        <option value="1" ${behavior === 1 ? 'selected' : ''}>1</option>
                                        <option value="2" ${behavior === 2 ? 'selected' : ''}>2</option>
                                        <option value="3" ${behavior === 3 ? 'selected' : ''}>3</option>
                                        <option value="4" ${behavior === 4 ? 'selected' : ''}>4</option>
                                        <option value="5" ${behavior === 5 ? 'selected' : ''}>5</option>
                                    </select>
                                </td>
                                <td><input type="text" class="grade-input" data-id="${s.id}" data-field="notes" placeholder="..." value="${notes}" data-date="${rec.date}"></td>
                                <td class="total-grade">${total}</td>
                            </tr>
                        `;
                    });
                }
            });

            app.innerHTML = `
                <div>
                    <div class="header">
                        <div class="logo">${currentUser?.classes?.class_name || 'الفصل'}</div>
                        <button class="btn" id="logoutBtn">تسجيل خروج</button>
                    </div>
                    <div class="date-range">
                        <label>من تاريخ:</label>
                        <input type="date" id="startDate" value="${startDate}">
                        <label>إلى تاريخ:</label>
                        <input type="date" id="endDate" value="${endDate}">
                        <button class="btn" id="fetchRangeBtn">عرض</button>
                        <button class="btn btn-success" id="exportExcelBtn">📥 تصدير Excel</button>
                    </div>
                    <div class="dashboard-summary"></div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>الاسم</th>
                                    <th>القداس (0/10)</th>
                                    <th>التناول (0/10)</th>
                                    <th>حضور الخدمة (0/10)</th>
                                    <th>السلوك (0-5)</th>
                                    <th>ملاحظات</th>
                                    <th>المجموع</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rows}
                            </tbody>
                        </table>
                    </div>
                    <button class="save-btn" id="saveAttendance">حفظ التعديلات</button>
                    <div id="message"></div>
                </div>
            `;

            // تحديث dashboard
            updateDashboard();

            // ربط الأحداث
            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('fetchRangeBtn').addEventListener('click', async () => {
                const newStart = document.getElementById('startDate').value;
                const newEnd = document.getElementById('endDate').value;
                attendanceRecords = await fetchAttendanceForDateRange(currentClassId, newStart, newEnd);
                renderAttendanceTable(newStart, newEnd);
            });
            document.getElementById('exportExcelBtn').addEventListener('click', exportToExcel);
            document.getElementById('saveAttendance').addEventListener('click', () => saveAttendance(currentClassId));

            attachInputListeners();
        }

        function renderAttendanceTableForAdmin(classId, startDate, endDate) {
            // مشابه للدالة السابقة ولكن مع عرض في adminDashboard
            const dates = [...new Set(attendanceRecords.map(r => r.date))].sort();

            let rows = '';
            students.forEach(s => {
                const studentRecords = attendanceRecords.filter(r => r.student_id === s.id);
                if (studentRecords.length === 0) {
                    rows += `<tr><td colspan="7" style="text-align:right;">${s.name} - لا توجد بيانات</td></tr>`;
                } else {
                    studentRecords.sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(rec => {
                        const mass = rec.mass_grade || 0;
                        const communion = rec.communion_grade || 0;
                        const classGrade = rec.class_grade || 0;
                        const behavior = rec.behavior_grade || 0;
                        const notes = rec.notes || '';
                        const total = mass + communion + classGrade + behavior;
                        const repeated = hasRepeatedAbsence(s.id, attendanceRecords) ? ' <span class="repeated-absence">⚠️ غاب مرتين</span>' : '';
                        rows += `
                            <tr>
                                <td>${s.name}${repeated}</td>
                                <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="mass" value="${mass}" data-date="${rec.date}"></td>
                                <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="communion" value="${communion}" data-date="${rec.date}"></td>
                                <td><input type="number" min="0" max="10" step="10" class="grade-input" data-id="${s.id}" data-field="class" value="${classGrade}" data-date="${rec.date}"></td>
                                <td>
                                    <select class="behavior-select" data-id="${s.id}" data-field="behavior" data-date="${rec.date}">
                                        <option value="0" ${behavior === 0 ? 'selected' : ''}>0</option>
                                        <option value="1" ${behavior === 1 ? 'selected' : ''}>1</option>
                                        <option value="2" ${behavior === 2 ? 'selected' : ''}>2</option>
                                        <option value="3" ${behavior === 3 ? 'selected' : ''}>3</option>
                                        <option value="4" ${behavior === 4 ? 'selected' : ''}>4</option>
                                        <option value="5" ${behavior === 5 ? 'selected' : ''}>5</option>
                                    </select>
                                </td>
                                <td><input type="text" class="grade-input" data-id="${s.id}" data-field="notes" placeholder="..." value="${notes}" data-date="${rec.date}"></td>
                                <td class="total-grade">${total}</td>
                            </tr>
                        `;
                    });
                }
            });

            document.getElementById('adminDashboard').innerHTML = `
                <div class="date-range">
                    <label>من تاريخ:</label>
                    <input type="date" id="startDateAdmin" value="${startDate}">
                    <label>إلى تاريخ:</label>
                    <input type="date" id="endDateAdmin" value="${endDate}">
                    <button class="btn" id="fetchRangeAdminBtn">عرض</button>
                    <button class="btn btn-success" id="exportExcelAdminBtn">📥 تصدير Excel</button>
                </div>
                <div class="dashboard-summary"></div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>الاسم</th>
                                <th>القداس (0/10)</th>
                                <th>التناول (0/10)</th>
                                <th>حضور الخدمة (0/10)</th>
                                <th>السلوك (0-5)</th>
                                <th>ملاحظات</th>
                                <th>المجموع</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows}
                        </tbody>
                    </table>
                </div>
                <button class="save-btn" id="saveAttendanceAdmin">حفظ التعديلات</button>
                <div id="message"></div>
            `;

            updateDashboard();

            document.getElementById('fetchRangeAdminBtn').addEventListener('click', async () => {
                const newStart = document.getElementById('startDateAdmin').value;
                const newEnd = document.getElementById('endDateAdmin').value;
                attendanceRecords = await fetchAttendanceForDateRange(classId, newStart, newEnd);
                renderAttendanceTableForAdmin(classId, newStart, newEnd);
            });
            document.getElementById('exportExcelAdminBtn').addEventListener('click', exportToExcel);
            document.getElementById('saveAttendanceAdmin').addEventListener('click', () => saveAttendance(classId));

            attachInputListeners();
        }

        async function saveAttendance(classIdForAdmin = null) {
            const classId = classIdForAdmin || currentClassId;
            // نحتاج إلى جمع جميع الحقول المعدلة. هنا سنقوم بجمع كل الصفوف وحفظها بناءً على التاريخ المضمن في data-date
            const rows = document.querySelectorAll('tbody tr');
            const updates = [];

            rows.forEach(row => {
                const studentId = row.querySelector('[data-field="mass"]')?.dataset.id;
                const date = row.querySelector('[data-field="mass"]')?.dataset.date;
                if (!studentId || !date) return;
                const mass = parseInt(row.querySelector('[data-field="mass"]')?.value) || 0;
                const communion = parseInt(row.querySelector('[data-field="communion"]')?.value) || 0;
                const classGrade = parseInt(row.querySelector('[data-field="class"]')?.value) || 0;
                const behavior = parseInt(row.querySelector('[data-field="behavior"]')?.value) || 0;
                const notes = row.querySelector('[data-field="notes"]')?.value || '';

                updates.push({
                    student_id: studentId,
                    date: date,
                    mass_grade: mass,
                    communion_grade: communion,
                    class_grade: classGrade,
                    behavior_grade: behavior,
                    notes: notes,
                    recorded_by: currentUser.id
                });
            });

            let hasError = false;
            for (let rec of updates) {
                const { error } = await supabaseClient.from('attendance').upsert(rec, { onConflict: 'student_id, date' });
                if (error) {
                    console.error(error);
                    hasError = true;
                }
            }

            const msgDiv = document.getElementById('message');
            if (hasError) {
                msgDiv.innerHTML = '<div class="message error">حدث خطأ أثناء الحفظ، بعض السجلات قد لا تكون محفوظة.</div>';
            } else {
                msgDiv.innerHTML = '<div class="message success">تم حفظ التعديلات بنجاح</div>';
                // تحديث attendanceRecords
                const startInput = classIdForAdmin ? document.getElementById('startDateAdmin') : document.getElementById('startDate');
                const endInput = classIdForAdmin ? document.getElementById('endDateAdmin') : document.getElementById('endDate');
                const start = startInput ? startInput.value : getThreeWeeksAgo();
                const end = endInput ? endInput.value : getTodayDate();
                attendanceRecords = await fetchAttendanceForDateRange(classId, start, end);
                // إعادة رسم الجدول
                if (classIdForAdmin) {
                    renderAttendanceTableForAdmin(classId, start, end);
                } else {
                    renderAttendanceTable(start, end);
                }
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            init();
        }

        console.log('الملف الجديد مع نطاق تاريخ وتصدير Excel وتحذير الغياب المتكرر');
        init();
    </script>
</body>
</html>
